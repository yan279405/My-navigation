<!DOCTYPE html>
<html lang="zh-CN">
<head>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hub OS">
<link rel="apple-touch-icon" href="icon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>Creator Hub OS26 - Apple Ecosystem Edition</title>
<style>
    /* ==================== 1. Apple 原生生态核心变量 ==================== */
    :root {
        --text-main: #ffffff;
        --text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        
        /* 🎨 官方 Squircle 连续曲率视觉修正值 */
        --icon-radius: 24%; 
        --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", sans-serif;

        /* 🎯 全局图标尺寸同步指针 */
        --icon-size: 62px;
    }

    /* 1. 修复 body 的高度危机 */
body {
    margin: 0;
    padding: 0;
    font-family: var(--font-stack);
    height: 100dvh;              /* ✨ 修复：改成 100dvh，彻底解决 iOS Safari 底部工具栏遮挡 Dock 的顽疾 */
    width: 100vw;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    touch-action: manipulation;              
    overscroll-behavior: none;              
    -webkit-user-select: none;              
    user-select: none;
    -webkit-tap-highlight-color: transparent; 
    background: radial-gradient(circle at 10% 10%, #1a1a2e 0%, #16213e 40%, #0f3460 80%, #e94560 120%);
    background-size: cover;
    background-attachment: fixed;
    transition: background 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
}

    /* 全屏毛玻璃视口 */
    .blur-overlay {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(10, 10, 20, 0.12);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        z-index: 1;
    }

    /* 主容器与 App 矩阵网格 */
    main {
        position: relative;
        z-index: 2;
        flex: 1;
        width: 100%;
        box-sizing: border-box;
        padding: calc(40px + env(safe-area-inset-top)) 24px 20px 24px;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
    }

    main::-webkit-scrollbar {
        width: 4px;
    }
    main::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.15);
        border-radius: 10px;
    }

    /* 默认基础布局：iPhone 竖屏 */
    .app-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr); 
        gap: 32px 16px; 
        max-width: 480px;
        margin: 0 auto;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* ==================== 4. Apple 高保真桌面图标 ==================== */
    .app-icon {
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        outline: none;
        transition: transform 0.2s cubic-bezier(0.33, 1, 0.68, 1);
        -webkit-tap-highlight-color: transparent;
    }

    .app-icon:active {
        transform: scale(0.9); 
    }

    .icon-wrapper {
        width: var(--icon-size);
        height: var(--icon-size);
        border-radius: var(--icon-radius);
        box-shadow: 0 5px 14px rgba(0, 0, 0, 0.12), inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 7px;
        position: relative;
        overflow: hidden;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .icon-wrapper svg {
        width: calc(var(--icon-size) * 0.48);
        height: calc(var(--icon-size) * 0.48);
        fill: currentColor;
    }

    .app-name {
        color: var(--text-main);
        font-size: 11px; 
        font-weight: 400; 
        letter-spacing: 0.4px; 
        text-align: center;
        width: 100%;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        text-shadow: var(--text-shadow);
        opacity: 0.92;
    }

   /* 2. 优雅重构 Footer 和常驻签名（扔掉所有危险的负 margin 和巨大位移） */
footer {
    position: relative;
    z-index: 2;
    width: 100%;
    padding-bottom: calc(16px + env(safe-area-inset-bottom)); /* 全面屏底部安全垫 */
    padding-top: 10px;
    
    display: flex;
    flex-direction: column;     
    align-items: center;
    justify-content: center;
    gap: 14px;                  /* ✨ 修复：利用 Flex 的 gap 自动控制文字与 Dock 的黄金呼吸间距，绝不重叠 */
}

/* 🏷️ 常驻昵称与联系方式（上下两行高保真排版） */
.user-signature {
    font-size: 11px;             
    color: rgba(255, 255, 255, 0.45); 
    letter-spacing: 0.6px;       
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3); 
    
    display: flex;
    flex-direction: column;     
    align-items: center;        
    gap: 5px;                   
    
    /* ✨ 修复：彻底删除原有的 margin-top: -25px 和 transform: translateY(-110px) */
    user-select: text;
    -webkit-user-select: text;
}
/* 竖线分割符的微调 */
.signature-split {
    opacity: 0.3;
    font-weight: 300;
}

    .dock-container {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        
        height: var(--icon-size); 
        padding: 0 16px;
        display: flex;
        align-items: center; 
        justify-content: center;
        gap: 20px; 
        box-sizing: border-box;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* Dock 项外围触发器 */
    .dock-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        position: relative;
        box-sizing: border-box;
        
        /* 未激活时保持高雅的半透明 */
        opacity: 0.65;
        transform: scale(0.96);
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* 💎 核心修改：内嵌纵向排版的高级毛玻璃底座 */
    .dock-icon-wrapper {
        width: var(--icon-size);
        height: var(--icon-size);
        border-radius: var(--icon-radius) !important;
        
        background: rgba(255, 255, 255, 0.08) !important;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 5px 14px rgba(0, 0, 0, 0.12), inset 0 0 0 1px rgba(255, 255, 255, 0.08) !important;
        
        /* 🧬 变为垂直 Flex 排版，让 Emoji 和文字在方块内部上下堆叠 */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px; /* 极其紧凑的内部呼吸间距 */
        overflow: hidden;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* 方块内部的 Emoji：微调尺寸腾出纵向空间 */
    .dock-emoji {
        font-size: calc(var(--icon-size) * 0.36); 
        line-height: 1;
        transition: transform 0.3s ease;
    }

    /* 3. 规避小字号被系统强行放大的风险 */
.dock-name {
    color: var(--text-main);
    /* ✨ 修复：设定最小 10px 保护线，防止在部分安卓或老款 iPhone 上排版因字体限制而错乱变大 */
    font-size: clamp(10px, calc(var(--icon-size) * 0.15), 12px); 
    font-weight: 400;
    letter-spacing: 0.2px;
    text-align: center;
    width: 88%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    opacity: 0.75;
    line-height: 1;
}

    /* 激活态：整体恢复 100% 不透明度 */
    .dock-item.active {
        opacity: 1;
        transform: scale(1.02);
    }

    /* 激活态：方块底座加深，微光边缘点亮 */
    .dock-item.active .dock-icon-wrapper {
        background: rgba(255, 255, 255, 0.18) !important;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.16), inset 0 0 0 1px rgba(255, 255, 255, 0.15) !important;
    }

    /* 激活态：内部细节微调 */
    .dock-item.active .dock-name {
        opacity: 1;
        font-weight: 500;
    }
    .dock-item.active .dock-emoji {
        transform: scale(1.05); /* 激活时 Emoji 轻微放大 */
    }

    .dock-item:active {
        transform: scale(0.9);
    }

    /* 精致的底部小圆点指示器 */
    .dock-item::after {
        content: '';
        position: absolute;
        bottom: -8px; /* 直接挂在方块底边下方 */
        left: 50%;
        transform: translateX(-50%) scale(0);
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background-color: rgba(255, 255, 255, 0.95);
        box-shadow: 0 0 4px rgba(255, 255, 255, 0.5);
        transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .dock-item.active::after {
        transform: translateX(-50%) scale(1);
    }

    /* 4. ✨ 新增：超小屏幕（宽小于 360px）手机防挤爆防线 */
@media (max-width: 360px) {
    :root {
        --icon-size: 55px;     /* 极窄屏幕下微调缩小方块尺寸 */
    }
    .dock-container {
        gap: 12px;             /* 缩减方块间距 */
        padding: 0 10px;
    }
    main {
        padding: calc(30px + env(safe-area-inset-top)) 16px 15px 16px; /* 压缩上方 App 矩阵的间距 */
    }
    .app-grid {
        gap: 24px 12px;        /* 压缩 App 图标间距 */
    }
}
/* ==================== 6. 苹果全生态全时自适应矩阵 (iOS / iPadOS / macOS) ==================== */

   /* ==================== 6. 苹果全生态全时自适应矩阵 (完美修正版) ==================== */

    /* 📑 【1. iPadOS 平板纵屏模式】 特征：中等宽度，高挑纵向。针对 iPad 竖放状态 */
    @media (min-width: 600px) and (max-width: 1024px) and (orientation: portrait) {
        :root {
            --icon-size: 68px;       /* 平板纵屏尊享 68px 大图标 */
        }
        .app-grid {
            grid-template-columns: repeat(6, 1fr); /* 优雅的 6 列桌面 */
            max-width: 720px;
            gap: 38px 22px;
        }
        .dock-container {
            gap: 24px;
        }
    }

    /* 💻 【2. iPadOS 平板横屏模式 & 中小屏笔记本】 特征：宽大舒适，高度适中 */
    @media (min-width: 600px) and (max-width: 1366px) and (orientation: landscape) {
        :root {
            --icon-size: 66px;       /* 横放时略微收敛图标，防压迫感 */
        }
        main {
            padding: calc(35px + env(safe-area-inset-top)) 32px 15px 32px;
        }
        .app-grid {
            grid-template-columns: repeat(8, 1fr); /* 经典的 iPad 8 列矩阵 */
            max-width: 900px;
            gap: 26px 20px;          
        }
        .dock-container {
            gap: 26px;
        }
    }

    /* 🖥️ 【3. macOS / PC 电脑端大屏横屏】 特征：无限宽广的黄金画布 */
    @media (min-width: 1367px) {
        :root {
            --icon-size: 74px;       /* 桌面端大屏幕拉满 74px，彰显秩序美 */
        }
        main {
            padding: 55px 40px 25px 40px;
        }
        .app-grid {
            grid-template-columns: repeat(8, 1fr); /* 气势磅礴的 8 列标准 Mac 网格 */
            max-width: 1060px;
            gap: 42px 28px;          
        }
        .dock-container {
            gap: 32px;
        }
        .app-name {
            font-size: 12px;         /* 电脑大屏字体同步微调放大 */
        }
    }

    /* 📱 【4. iOS/Android 手机横屏模式】 
       ✨ 核心修正：降维打击级防线！移至靠后位置，利用 max-height: 500px 降维锁定所有手机横放状态 */
    @media (orientation: landscape) and (max-height: 500px) {
        :root {
            --icon-size: 42px;       /* 强力压缩主屏幕图标，给矮屏幕腾出纵向空间 */
        }
        main {
            padding: calc(10px + env(safe-area-inset-top)) 20px 5px 20px; /* 极致压缩上下留白 */
        }
        .app-grid {
            grid-template-columns: repeat(7, 1fr); /* 横向平铺 7 列，大幅减少纵向滚动 */
            gap: 12px 16px;          /* 极致压缩行间距（12px） */
            max-width: 640px;
        }
        .icon-wrapper {
            margin-bottom: 4px;      /* 压缩主屏幕图标与名字的间距 */
        }
        footer {
            padding-top: 2px;
            padding-bottom: calc(4px + env(safe-area-inset-bottom));
            gap: 4px;                /* 压缩 Dock 与文字的间距 */
        }
        .dock-container {
            gap: 12px;               /* 缩减 Dock 胶囊之间的纵向间距 */
            height: 38px !important; /* 强制降低 Dock 整体高度 */
        }

        /* 💎 UX 级重构：手机横屏时，方块底座自动进化为【横向扁平高保真胶囊】，文字与 Emoji 并排 */
        .dock-icon-wrapper {
            width: auto !important;         /* 取消固定正方形宽度限制 */
            height: 34px !important;        /* 降低高度 */
            padding: 0 12px !important;     /* 左右留出舒适的呼吸Padding */
            flex-direction: row !important; /* 🔥 致命核心：由上下堆叠改为横向并排 */
            gap: 6px !important;            /* Emoji 与文字的间距 */
            border-radius: 10px !important; /* 更加精致的轻量曲率圆角 */
        }
        .dock-emoji {
            font-size: 15px !important;     /* 扁平胶囊内的 Emoji 黄金比例 */
        }
        .dock-name {
            font-size: 11px !important;     /* 文字恢复清晰的 11px */
            width: auto !important;         /* 允许容器根据文字宽度自动展开 */
            opacity: 0.9 !important;
            overflow: visible !important;
            white-space: nowrap !important;
            text-overflow: clip !important; /* 彻底移除缩略省略号，完美显示 4 个字 */
        }

        /* ⚡ 核心修复：签名和微信在手机横屏时自动变为【左右并排】，绝不占用高度 */
        .user-signature {
            flex-direction: row;     
            gap: 16px;
        }
    }

    /* 🚨 【5. 绝境级超矮屏幕高度保护】 当手机横屏还被浏览器顶出极高工具栏时启动 */
    @media (max-height: 400px) and (orientation: landscape) {
        .app-grid {
            gap: 8px 16px !important; 
        }
        :root {
            --icon-size: 38px;
        }
    }

</style>
</head>
<body>

<div class="blur-overlay"></div>

<main id="main">
    <div class="app-grid" id="grid">
        </div>
</main>

<footer>
    <div class="user-signature">
        <span class="nickname">🪄 颜途的视界</span>
        <span class="contact-info">📱 微信：YourWeChat</span>
    </div>

    <div class="dock-container" id="dock"></div>
</footer>

    const dock = document.getElementById('dock');
    const grid = document.getElementById('grid');

    // 核心渲染引擎
    function renderApps(key) {
        const data = DATA[key];
        if (!data) return;
        
        // 激活 Dock 指示器样式反馈
        document.querySelectorAll('.dock-item[data-key]').forEach(el => {
            el.classList.toggle('active', el.dataset.key === key);
        });
        
        // 渲染纯粹的原生 App 图标矩阵
        grid.innerHTML = data.items.map(item => `
            <div class="app-icon" onclick="window.open('${item.url}', '_blank')">
                <div class="icon-wrapper" style="background: ${item.bg}; color: ${item.color || '#ffffff'};">
                    ${item.svg}
                </div>
                <div class="app-name">${item.name}</div>
            </div>
        `).join('');
        
        document.getElementById('main').scrollTop = 0;
    }

    // 1. 动态生成内嵌式 Dock 项目 (Emoji 与文字完全融入方块内部)
    Object.keys(DATA).forEach(key => {
        const item = document.createElement('div');
        item.className = 'dock-item';
        item.dataset.key = key;
        item.title = DATA[key].name;
        
        // 🛠️ 核心修改：将文字（dock-name）放进 dock-icon-wrapper 内部，并把原 Emoji 用 span.dock-emoji 包裹起来
        item.innerHTML = `
            <div class="dock-icon-wrapper">
                <span class="dock-emoji">${DATA[key].short}</span>
                <span class="dock-name">${DATA[key].name}</span>
            </div>
        `;
        
        item.onclick = () => renderApps(key);
        dock.appendChild(item);
    });

    // 2. 默认加载时保持主屏幕完全点亮
        renderApps('global'); 
    // 3. 注册 Service Worker，激活 PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('PWA 安装成功！', reg))
                .catch(err => console.log('PWA 安装失败', err));
        });
    }

    // 4. 强力防卡死全局保护补丁 (阻止 iOS 双指、双击误触缩放层死锁)
    document.addEventListener('gesturestart', function(event) {
        event.preventDefault();
    });

    let lastTouchEnd = 0;
    document.addEventListener('touchend', function(event) {
        const now = (new Date()).getTime();
        if (now - lastTouchEnd <= 300) {
            event.preventDefault(); 
        }
        lastTouchEnd = now;
    }, { passive: false });
</script>
