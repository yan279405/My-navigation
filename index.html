<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>颜途的视界 · 全网矩阵</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#020617;
    --card:rgba(255,255,255,.05);
    --border:rgba(255,255,255,.08);
    --text:#fff;
    --sub:#94a3b8;
    --blue:#38bdf8;
}

body{
    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "PingFang SC",
        sans-serif;

    background:var(--bg);

    color:var(--text);

    overflow:hidden;
}

/* 背景 */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:
        radial-gradient(
            circle at 15% 20%,
            rgba(56,189,248,.25),
            transparent 35%
        ),

        radial-gradient(
            circle at 80% 10%,
            rgba(99,102,241,.25),
            transparent 35%
        ),

        radial-gradient(
            circle at 50% 90%,
            rgba(14,165,233,.15),
            transparent 40%
        );

    filter:blur(40px);

    z-index:-1;
}

/* 总体布局 */

.wrapper{

    display:flex;

    height:100vh;
}

/* 左侧 */

.sidebar{

    width:320px;

    padding:35px;

    background:
        rgba(15,23,42,.82);

    backdrop-filter:
        blur(30px);

    border-right:
        1px solid var(--border);
}

/* 用户信息 */

.profile{

    text-align:center;

    margin-bottom:40px;
}

.avatar{

    width:100px;
    height:100px;

    margin:auto;

    border-radius:50%;

    background:
        linear-gradient(
            135deg,
            #38bdf8,
            #6366f1
        );

    box-shadow:
        0 0 40px
        rgba(56,189,248,.4);
}

.profile h1{

    margin-top:18px;

    font-size:30px;
}

.profile p{

    margin-top:8px;

    color:var(--sub);
}

/* 导航 */

.nav{

    display:flex;

    flex-direction:column;

    gap:12px;
}

.nav-btn{

    padding:18px;

    border-radius:18px;

    background:
        rgba(255,255,255,.04);

    cursor:pointer;

    transition:.25s;

    border:
        1px solid transparent;
}

.nav-btn:hover{

    transform:
        translateX(8px);

    border-color:
        rgba(56,189,248,.4);
}

.nav-btn.active{

    background:
        linear-gradient(
            90deg,
            rgba(56,189,248,.35),
            rgba(99,102,241,.15)
        );

    border-color:
        var(--blue);
}

/* 主区域 */

.main{

    flex:1;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:50px;
}

/* 卡片 */

.card{

    width:900px;

    overflow:hidden;

    background:
        var(--card);

    backdrop-filter:
        blur(30px);

    border:
        1px solid var(--border);

    border-radius:30px;

    box-shadow:
        0 30px 80px
        rgba(0,0,0,.45);

    animation:
        fade .35s;
}

.hero{

    height:320px;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:120px;

    background:
        linear-gradient(
            135deg,
            #38bdf8,
            #6366f1
        );
}

.content{

    padding:40px;
}

.title{

    font-size:42px;

    font-weight:700;
}

.desc{

    margin:20px 0;

    line-height:1.8;

    color:#cbd5e1;
}

/* 数据 */

.stats{

    display:flex;

    gap:50px;

    margin:30px 0;
}

.stat b{

    display:block;

    font-size:32px;
}

/* 标签 */

.tags{

    display:flex;

    flex-wrap:wrap;

    gap:10px;

    margin-bottom:30px;
}

.tag{

    padding:8px 16px;

    border-radius:999px;

    background:
        rgba(255,255,255,.08);
}

/* 按钮 */

.visit{

    display:inline-block;

    padding:16px 36px;

    background:
        var(--blue);

    color:#000;

    border-radius:14px;

    text-decoration:none;

    font-weight:700;
}

@keyframes fade{

    from{

        opacity:0;

        transform:
            translateY(20px);
    }

    to{

        opacity:1;

        transform:none;
    }
}

</style>
</head>

<body>

<div class="wrapper">

    <aside class="sidebar">

        <div class="profile">

            <div class="avatar"></div>

            <h1>二哥</h1>

            <p>
                旅行 × 人文 × 纪录片
            </p>

        </div>

        <div class="nav" id="nav"></div>

    </aside>

    <main class="main">

        <div class="card">

            <div class="hero" id="hero"></div>

            <div class="content">

                <div class="title" id="title"></div>

                <div class="desc" id="desc"></div>

                <div class="stats">

                    <div class="stat">
                        <b id="fans"></b>
                        粉丝
                    </div>

                    <div class="stat">
                        <b id="works"></b>
                        内容
                    </div>

                    <div class="stat">
                        <b id="views"></b>
                        播放
                    </div>

                </div>

                <div class="tags" id="tags"></div>

                <a
                    id="link"
                    class="visit"
                    target="_blank">

                    进入主页 →
                </a>

            </div>

        </div>

    </main>

</div>

<script>

const DATA=[

{
icon:"📺",
name:"Bilibili",
desc:"旅行、人文、乡村纪录片创作基地",
fans:"12.3W",
works:"326",
views:"890W",
tags:["纪录片","旅行","人文"],
url:"https://space.bilibili.com/你的UID"
},

{
icon:"📕",
name:"小红书",
desc:"旅行生活与深度体验分享",
fans:"8.5W",
works:"588",
views:"230W",
tags:["旅行","摄影","生活"],
url:"https://www.xiaohongshu.com/user/profile/你的ID"
},

{
icon:"🎵",
name:"抖音",
desc:"短视频与纪录片矩阵",
fans:"23W",
works:"1068",
views:"5200W",
tags:["短视频","流量","剪辑"],
url:"https://www.douyin.com/user/你的ID"
},

{
icon:"▶",
name:"YouTube",
desc:"海外旅行纪录片频道",
fans:"3.2W",
works:"135",
views:"420W",
tags:["海外","纪录片","Vlog"],
url:"https://youtube.com/@你的账号"
},

{
icon:"✖",
name:"X",
desc:"全球社媒与资讯矩阵",
fans:"1.5W",
works:"208",
views:"95W",
tags:["国际","资讯","社媒"],
url:"https://x.com/你的账号"
}

];

function show(i){

    const d=DATA[i];

    hero.innerHTML=d.icon;

    title.innerHTML=d.name;

    desc.innerHTML=d.desc;

    fans.innerHTML=d.fans;

    works.innerHTML=d.works;

    views.innerHTML=d.views;

    tags.innerHTML=
        d.tags
        .map(x=>`<span class="tag">${x}</span>`)
        .join('');

    link.href=d.url;

    document
        .querySelectorAll('.nav-btn')
        .forEach(x=>x.classList.remove('active'));

    document
        .querySelectorAll('.nav-btn')[i]
        .classList.add('active');
}

DATA.forEach((d,i)=>{

    nav.innerHTML+=`

        <div
            class="nav-btn ${i==0?'active':''}"
            onclick="show(${i})">

            ${d.icon} ${d.name}

        </div>

    `;
});

show(0);

</script>

</body>
</html>
