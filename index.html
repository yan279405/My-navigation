<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Creator Hub OS26</title>
<style>
    :root {
        --bg-dark: #000000;
        --sidebar-bg: rgba(28, 28, 30, 0.85);
        --text-main: #ffffff;
        --text-secondary: #8e8e93;
        --accent: #0a84ff;
        --glass-border: rgba(255, 255, 255, 0.1);
        --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
        margin: 0;
        background: var(--bg-dark);
        color: var(--text-main);
        font-family: var(--font-stack);
        height: 100vh;
        display: flex;
        overflow: hidden;
    }

    /* ==================== 桌面端 & iPad 横屏 默认样式 ==================== */
    .sidebar {
        width: 280px;
        background: var(--sidebar-bg);
        backdrop-filter: blur(30px);
        border-right: 1px solid var(--glass-border);
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow-y: auto;
        flex-shrink: 0;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        z-index: 1000;
    }

    .profile-zone { text-align: center; margin-bottom: 20px; transition: all 0.3s; }
    .avatar { width: 80px; height: 80px; border-radius: 20px; background: #333; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; transition: all 0.3s; }
    .profile-name { font-weight: 600; transition: opacity 0.2s; }
    
    .nav-item {
        padding: 14px 18px;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: flex-start;
    }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
    .nav-item.active { background: var(--accent); color: white; font-weight: 600; }
    .nav-item span { transition: opacity 0.2s; }

    /* 右侧主内容区 */
    .main {
        flex: 1;
        overflow-y: auto;
        padding: 40px;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .card {
        background: rgba(255,255,255,0.05);
        padding: 20px;
        border-radius: 16px;
        border: 1px solid var(--glass-border);
        cursor: pointer;
        transition: transform 0.2s, background 0.2s;
    }
    .card:active { transform: scale(0.97); }
    .card:hover { background: rgba(255,255,255,0.1); }

    /* 移动端点击空白处关闭菜单的遮罩层 */
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 999; }

    /* ==================== 移动端适配 (iOS26 / iPad 竖屏) ==================== */
    @media (max-width: 768px) {
        /* 1. 侧边栏固定缩在屏幕最左边，呈现窄边框状态 */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100%;
            width: 60px; /* 左侧常驻窄边框的宽度 */
            padding: 30px 0;
            align-items: center;
        }

        /* 窄栏模式下的头像缩小 */
        .avatar { width: 32px; height: 32px; border-radius: 50%; font-size: 16px; margin-bottom: 0; }
        .profile-name { opacity: 0; display: none; }
        .profile-zone { margin-bottom: 20px; }

        /* 窄栏模式下导航文字隐藏，变成小圆点指示器 */
        .nav-item span { opacity: 0; display: none; }
        .nav-item {
            width: 40px;
            height: 40px;
            padding: 0;
            justify-content: center;
            border-radius: 50%;
        }
        .nav-item::before { content: "•"; font-size: 20px; color: var(--text-secondary); }
        .nav-item.active::before { color: #ffffff; }

        /* 2. 【核心改动】做了标记的图片位置整体右移，给左侧卡片留出安全间距，杜绝误触 */
        .main {
            padding: 30px 20px 30px 80px; /* 左侧留出 80px 的绝对安全区域 */
        }
        .grid { grid-template-columns: 1fr; }

        /* 3. 触摸/点击左侧窄边栏时，侧边栏顺滑移至屏幕的 4分之1 (或25vw~280px) 展开 */
        .sidebar.active {
            width: 75vw; /* 展开宽度，在小屏上约占 3/4，在较大屏上通过 max-width 锁定在 1/4 左右 */
            max-width: 280px;
            align-items: stretch;
            padding: 40px 20px;
            box-shadow: 10px 0 40px rgba(0,0,0,0.6);
        }
        /* 展开后的内部状态恢复 */
        .sidebar.active .avatar { width: 70px; height: 70px; border-radius: 20px; font-size: 28px; margin: 0 auto 10px; }
        .sidebar.active .profile-name { opacity: 1; display: block; }
        .sidebar.active .nav-item { width: 100%; height: auto; padding: 14px 18px; border-radius: 12px; justify-content: flex-start; }
        .sidebar.active .nav-item span { opacity: 1; display: inline; }
        .sidebar.active .nav-item::before { display: none; }

        /* 展开菜单时激活遮罩 */
        .sidebar.active ~ .overlay { display: block; }
    }
</style>
</head>
<body>

<div class="overlay" onclick="closeSidebar()"></div>

<nav class="sidebar" id="sidebar" onclick="openSidebar(event)"></nav>

<main class="main">
    <h1 id="title" style="margin-bottom: 20px;">Creator Hub</h1>
    <div class="grid" id="grid"></div>
</main>

<script>

        ]},

            {icon: "🍎", name: "Apple TV+", desc: "原创高品质剧集", url: "https://tv.apple.com"},
            {icon: "D", name: "Disney+", desc: "迪士尼流媒体", url: "https://disneyplus.com"},

            {icon: "🎵", name: "Apple Music", desc: "高清音乐歌单", url: "https://music.apple.com"}
        ]},
        news: { name: '资讯', items: [
            {icon: "📰", name: "澎湃新闻", desc: "时事要闻", url: "https://www.thepaper.cn"},
            {icon: "📰", name: "纽约时报", desc: "国际时事", url: "https://nytimes.com"},

            {icon: "🦊", name: "Fox News", desc: "福克斯新闻", url: "https://www.foxnews.com"},
            {icon: "🗞️", name: "华盛顿邮报", desc: "华盛顿邮报", url: "https://www.washingtonpost.com"},
            {icon: "🇬🇧", name: "BBC News", desc: "BBC News 中文", url: "https://www.bbc.com/zhongwen/simp"},
            {icon: "⚡", name: "Yahoo", desc: "雅虎新闻", url: "https://news.yahoo.com"},
            {icon: "📰", name: "Google", desc: "Google 新闻", url: "https://news.google.com"},
            {icon: "📖", name: "纽约时报", desc: "纽约时报中文网", url: "https://cn.nytimes.com"},
            {icon: "🌏", name: "路透社", desc: "突发国际新闻", url: "https://cn.reuters.com"},
            {icon: "💼", name: "华尔街日报", desc: "华尔街日报中文网", url: "https://cn.wsj.com"},
            {icon: "💰", name: "FT中文网", desc: "全球财经新闻", url: "https://www.ftchinese.com"},
            {icon: "🇫🇷", name: "法广", desc: "法广时事与新闻", url: "https://www.rfi.fr/cn"},
            {icon: "🇩🇪", name: "德国之声", desc: "在线报导", url: "https://www.dw.com,zh"},
            {icon: "🇨🇳", name: "ChinaNews", desc: "海外中国新闻", url: "https://www.chinanews.com.cn"},
            {icon: "明", name: "明报", desc: "明报网站", url: "https://news.mingpao.com"},
            {icon: "联", name: "联合新闻网", desc: "联合新闻网", url: "https://udn.com"},
            {icon: "🇱🇹", name: "自由时报", desc: "自由时报电子报", url: "https://www.ltn.com.tw"},
            {icon: "🇸🇬", name: "联合早报", desc: "国际版首页", url: "https://www.zaobao.com.sg"}
        ]},
        graphic: { name: '图文', items: [
            {icon: "🛍️", name: "淘宝", desc: "在线购物", url: "https://taobao.com"},
            {icon: "🛍️", name: "京东", desc: "在线购物", url: "https://jd.com"}
        ]},
        other: { name: '其他', items: [
            {icon: "⚪", name: "待定", desc: "空数据测试", url: "#"}
        ]},
        business: { name: '商务', items: [
            {icon: "💼", name: "商务合作", desc: "联系邮箱/合作", url: "mailto:example@email.com"},
            {icon: "📊", name: "Media Kit", desc: "创作者数据看板", url: "#"}
        ]}
    };

    const sidebar = document.getElementById('sidebar');

    // 移动端侧边栏交互控制逻辑
    function openSidebar(e) {
        if (window.innerWidth <= 768) {
            sidebar.classList.add('active');
            e.stopPropagation();
        }
    }

    function closeSidebar() {
        if (window.innerWidth <= 768) {
            sidebar.classList.remove('active');
        }
    }

    function handleNavClick(key, e) {
        render(key);
        closeSidebar();
        if (e) e.stopPropagation(); // 阻止事件冒泡防止重复触发展开
    }

    function render(key) {
        const data = DATA[key];
        document.getElementById('title').innerText = data.name;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.key === key));
        const grid = document.getElementById('grid');
        grid.innerHTML = data.items.map(item => `
            <div class="card" onclick="window.open('${item.url}', '_blank')">
                <div style="font-size: 24px; margin-bottom: 10px;">${item.icon}</div>
                <div style="font-weight: 600;">${item.name}</div>
                <div style="font-size: 13px; color: var(--text-secondary); margin-top: 4px;">${item.desc}</div>
            </div>
        `).join('');
    }

    // 初始化加载骨架
    sidebar.innerHTML = `
        <div class="profile-zone">
            <div class="avatar"></div>
            <div class="profile-name">颜途的视界</div>
        </div>
    `;
    
    Object.keys(DATA).forEach(key => {
        const item = document.createElement('div');
        item.className = 'nav-item';
        item.dataset.key = key;
        item.innerHTML = `<span>${DATA[key].name}</span>`;
        item.onclick = (e) => handleNavClick(key, e);
        sidebar.appendChild(item);
    });

    render('cn'); 
</script>
</body>
</html>
