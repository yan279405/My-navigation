  :root {
    --text-main: #ffffff;
    --text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
    --icon-radius: 24px;
    --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", sans-serif;
    --icon-size: 62px;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    font-family: var(--font-stack);
    min-height: 100dvh;
    width: 100%;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    touch-action: manipulation;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    background: #0f3460;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -2;
    background: radial-gradient(circle at 10% 10%, #1a1a2e 0%, #16213e 40%, #0f3460 80%, #e94560 120%);
  }

  body::after {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -1;
    background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0));
    pointer-events: none;
  }

  .blur-overlay {
    position: absolute;
    inset: 0;
    background: rgba(10, 10, 20, 0.12);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 1;
    pointer-events: none;
  }

  main {
    position: relative;
    z-index: 2;
    flex: 1;
    width: 100%;
    padding: calc(40px + env(safe-area-inset-top)) 20px 24px;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }

  main::-webkit-scrollbar {
    width: 4px;
  }

  main::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.15);
    border-radius: 10px;
  }

  .app-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
    gap: 32px 16px;
    max-width: 480px;
    margin: 0 auto;
  }

  .app-icon {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    outline: none;
    transition: transform 0.2s cubic-bezier(0.33, 1, 0.68, 1);
    -webkit-tap-highlight-color: transparent;
    will-change: transform;
  }

  .app-icon:active {
    transform: scale(0.9);
  }

  .icon-wrapper {
    width: var(--icon-size);
    height: var(--icon-size);
    border-radius: var(--icon-radius);
    box-shadow:
      0 5px 14px rgba(0, 0, 0, 0.12),
      inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 7px;
    position: relative;
    overflow: hidden;
    transition: transform 0.25s ease, opacity 0.25s ease, background-color 0.25s ease, box-shadow 0.25s ease, color 0.25s ease;
    contain: paint;
  }

  .icon-wrapper svg {
    width: calc(var(--icon-size) * 0.48);
    height: calc(var(--icon-size) * 0.48);
    fill: currentColor;
    display: block;
  }

  .app-name {
    color: var(--text-main);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.2px;
    text-align: center;
    width: 100%;
    max-width: 5em;
    line-height: 1.2;
    text-shadow: var(--text-shadow);
    opacity: 0.92;

    white-space: normal;
    overflow: hidden;
    word-break: break-all;
    overflow-wrap: anywhere;

    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 2;

    min-height: calc(1.2em * 2);
    margin: 0 auto;
  }

  footer {
    width: 100%;
    position: fixed;
    bottom: 0;
    left: 0;
    padding-bottom: calc(12px + env(safe-area-inset-bottom));
    padding-top: 10px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    background: transparent;
    pointer-events: none;
  }

  .user-signature {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.45);
    letter-spacing: 0.6px;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    user-select: text;
    -webkit-user-select: text;
  }

  .signature-split {
    opacity: 0.25;
    margin: 0 4px;
  }

  .dock-container {
    pointer-events: auto;
    background: rgba(255, 255, 255, 0.11);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(25px) saturate(210%);
    border: 1px solid rgba(255, 255, 255, 0.18);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
    height: 64px;
    padding: 0 14px;
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 10px;
    box-sizing: border-box;
    transition: transform 0.25s ease, opacity 0.25s ease, background-color 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    contain: layout paint style;
    max-width: calc(100vw - 18px);
    overflow-x: auto;
    overflow-y: hidden;
  }

  .dock-container::-webkit-scrollbar {
    height: 0;
  }

  .dock-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    position: relative;
    box-sizing: border-box;
    touch-action: none;
    -webkit-touch-callout: none;
    will-change: transform;
    flex: 0 0 auto;
    width: 58px;
  }

  .dock-icon-wrapper {
    width: 50px;
    height: 50px;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: transform 0.25s ease, opacity 0.25s ease, background-color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    box-sizing: border-box;
    padding: 4px;
  }

  .dock-emoji {
    font-size: 18px;
    line-height: 1;
    transition: transform 0.25s ease;
  }

  .dock-name {
    color: #fff;
    font-size: 9px;
    font-weight: 500;
    margin-top: 3px;
    opacity: 0.78;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 58px;
    text-align: center;
    text-shadow: var(--text-shadow);
    transition: color 0.25s ease, opacity 0.25s ease, font-weight 0.25s ease;
  }

  .dock-item.active .dock-icon-wrapper {
    background: rgba(255, 255, 255, 0.95);
    box-shadow: 0 4px 15px rgba(255, 255, 255, 0.25);
    border-color: rgba(255, 255, 255, 1);
  }

  .dock-item.active .dock-emoji {
    transform: scale(1.12);
  }

  .dock-item.active .dock-name {
    color: #121212;
    font-weight: 600;
    opacity: 1;
  }

  .dock-item:active .dock-icon-wrapper {
    transform: scale(0.88);
  }

  @media (min-width: 600px) and (max-width: 1024px) and (orientation: portrait) {

    .dock-emoji { font-size: 14px; }

    :root { --icon-size: 36px; }
    .app-grid { gap: 6px 14px; }
  }
</style>

function iconHTML(item) {
  return `<svg viewBox="0 0 1024 1024" aria-hidden="true"><circle cx="512" cy="512" r="400" fill="currentColor"></circle></svg>`;
}

function renderGroup(key, activeKey) {
  const group = DATA[key];
  return `
    <div class="app-icon" data-key="${key}" role="button" tabindex="0">
      <div class="icon-wrapper" style="background:${group.items[0]?.bg || 'linear-gradient(135deg,#555,#222)'}; color:${group.items[0]?.color || '#fff'}">
        ${iconHTML(group)}
      </div>
      <div class="app-name">${group.name}</div>
    </div>
  `;
}

function renderDockItem(key, activeKey) {
  const group = DATA[key];
  return `
    <div class="dock-item ${key === activeKey ? 'active' : ''}" data-key="${key}" role="button" tabindex="0">
      <div class="dock-icon-wrapper">
        <div class="dock-emoji">${group.short || '·'}</div>
      </div>
      <div class="dock-name">${group.short || group.name}</div>
    </div>
  `;
}

function renderGrid(key) {
  const group = DATA[key];
  grid.innerHTML = group.items.map(item => `
    <div class="app-icon" role="button" tabindex="0" data-url="${item.url}">
      <div class="icon-wrapper" style="background:${item.bg}; color:${item.color}">
        ${iconHTML(item)}
      </div>
      <div class="app-name">${item.name}</div>
    </div>
  `).join('');

  grid.querySelectorAll('.app-icon').forEach(el => {
    const url = el.dataset.url;
    el.addEventListener('click', () => window.open(url, '_blank'));
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') window.open(url, '_blank');
    });
  });
}

function renderDock(activeKey) {
  dock.innerHTML = Object.keys(DATA).map(key => renderDockItem(key, activeKey)).join('');
  dock.querySelectorAll('.dock-item').forEach(el => {
    const key = el.dataset.key;
    el.addEventListener('click', () => {
      renderGrid(key);
      renderDock(key);
      el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    });
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        renderGrid(key);
        renderDock(key);
      }
    });
  });
}

const firstKey = Object.keys(DATA)[0];
