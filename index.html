    /* ==========================================================================\
       1. 全局样式重置与苹果原生基础定义
       ========================================================================== */
    :root {
      --text-main: #ffffff;
      --text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
      --icon-radius: 22%; /* 苹果官方 Squircle 黄金圆角比例 */
      --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", sans-serif;
      
      /* 🖥️【Mac / 电脑窗口】像素级锁死参数：7 × 5 矩阵 */
      --grid-cols: 7;
      --icon-size: 76px;
      --gap-x: 32px; /* 横向物理间距锁死 */
      --gap-y: 36px; /* 纵向物理间距锁死 */
      /* 精确数学计算限制最大宽度：(76 * 7) + (32 * 6) = 724px */
      --container-max-w: 724px; 
    }

    /* ==========================================================================\
       2. 多端设备精细化矩阵硬限制（参照 iPhone 4×6、iPad 6×5 原生桌面）
       ========================================================================== */
    
    /* 📱【iPhone / 手机竖屏】：严格切换为标准 4 × 6 宫格 */
    @media (max-width: 480px) and (orientation: portrait) {
      :root {
        --grid-cols: 4;
        --icon-size: 64px;
        --gap-x: 22px;
        --gap-y: 26px;
        /* 精确限制盒子宽度：(64 * 4) + (22 * 3) = 322px */
        --container-max-w: 322px; 
      }
    }

    /* 📱【iPhone / 手机横屏】 */
    @media (max-height: 450px) and (orientation: landscape) {
      :root {
        --grid-cols: 7;
        --icon-size: 48px;
        --gap-x: 18px;
        --gap-y: 16px;
        --container-max-w: 442px;
      }
      .top-header { height: 12px !important; }
    }

    /* 📑【iPad / 平板】：严格切换为标准 6 × 5 矩阵 */
    @media (min-width: 481px) and (max-width: 1024px) {
      :root {
        --grid-cols: 6;
        --icon-size: 74px;
        --gap-x: 28px;
        --gap-y: 34px;
        /* 精确限制盒子宽度：(74 * 6) + (28 * 5) = 584px */
        --container-max-w: 584px;
      }
    }

    /* ==========================================================================\
       3. 页面骨架与双向弹性真居中系统（防散架、防变形）
       ========================================================================== */
    * { 
      box-sizing: border-box; 
      margin: 0;
      padding: 0;
    }
    
    html, body { 
      height: 100%;
      overflow: hidden;
      background-color: #000;
    }

    body {
      font-family: var(--font-stack);
      user-select: none;
      -webkit-user-select: none;
      background: radial-gradient(circle at center, #232f48 0%, #090d14 100%);
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* 顶部安全区域留白 */
    .top-header {
      height: 45px;
      width: 100%;
      flex-shrink: 0;
    }

    /* 核心安全滚动页：外层负责提供滚动条与全屏手势 */
    .launchpad-container {
      flex: 1;
      width: 100%;
      padding: 10px 20px 40px 20px;
      
      overflow-x: hidden;
      overflow-y: auto; /* 在主安全区内部无缝进行上下手势滚动翻页 */
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch; 
      
      /* 终极奥义：使内部的 App 盒子在水平方向绝对居中，两边多余空间全部化作完美留白 */
      display: flex;
      justify-content: center; 
      align-items: flex-start; 
    }

    /* 隐藏原生粗糙滚动条，还原完美纯净度 */
    .launchpad-container::-webkit-scrollbar {
      display: none;
    }

    /* 固若金汤的网格盒子 */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(var(--grid-cols), 1fr);
      
      width: 100%;
      max-width: var(--container-max-w); /* 核心：用最大宽度卡死它，使其在缩放时绝不横向拉伸间距 */
      
      column-gap: var(--gap-x);
      row-gap: var(--gap-y);
      
      justify-items: center;
      align-items: start;
      padding-bottom: 60px; /* 预留底部，防止图标被 Dock 遮挡 */
    }

    /* ==========================================================================\
       4. 图标组件细节（像素级完美对齐与文字裁切）
       ========================================================================== */
    .app-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      /* 条目容器宽度与图标完全等宽，避免 Grid 内部单元格产生无法对齐的诡异错位 */
      width: var(--icon-size); 
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.2s ease;
      outline: none;
    }

    .app-item:active {
      transform: scale(0.88);
      opacity: 0.8;
    }

    /* 图标外观外盒：锁死正方形比例 */
    .icon-wrapper {
      width: var(--icon-size);
      height: var(--icon-size);
      border-radius: var(--icon-radius);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      background: #333;
    }

    /* 完美的内置 SVG 图标比例（52% 的标准视觉安全区区域） */
    .icon-wrapper svg {
      width: 52% !important;
      height: 52% !important;
      display: block;
    }

    .icon-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .icon-fallback {
      font-size: 26px;
      font-weight: 600;
    }

    /* 应用文字：完全仿照 iOS/macOS 规范，多出的一行截断成 ... */
    .app-name {
      margin-top: 8px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-main);
      text-shadow: var(--text-shadow);
      text-align: center;
      /* 允许名字两侧比图标略宽出 12px 的呼吸位，但整体保持高内聚 */
      width: calc(var(--icon-size) + 12px); 
      
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ==========================================================================\
       5. 底部高斯模糊毛玻璃 Dock 栏
       ========================================================================== */
    .dock-container {
      width: 100%;
      display: flex;
      justify-content: center;
      padding-bottom: 16px;
      padding-top: 5px;
      flex-shrink: 0;
    }

    .dock {
      background: rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 22px;
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      max-width: 92%;
      overflow-x: auto;
    }
    .dock::-webkit-scrollbar { display: none; }

    .dock-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      padding: 4px 12px;
      transition: all 0.2s ease;
    }

    .dock-icon-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .dock-emoji {
      font-size: 20px;
      line-height: 1.2;
    }

    .dock-name {
      font-size: 9px;
      color: #fff;
      margin-top: 1px;
      font-weight: 500;
      opacity: 0.8;
    }
  </style>

    const grid = document.getElementById('appGrid');
    const dock = document.getElementById('dockBar');
    const scrollContainer = document.getElementById('scrollContainer');

    function cleanSVG(svgStr) {
      if (!svgStr) return '';
      let clean = svgStr.replace(/\\"/g, '"').replace(/\\'/g, "'");
      if (!clean.includes('fill=')) {
        clean = clean.replace('<svg', '<svg fill="currentColor"');
      }
      return clean;
    }

    function renderApps(categoryKey) {
      grid.innerHTML = '';
      scrollContainer.scrollTop = 0; // 重置翻页状态
      
      const category = DATA[categoryKey];
      if (!category || !category.items) return;

      const fragment = document.createDocumentFragment();
      
      category.items.forEach(app => {
        const item = document.createElement('div');
        item.className = 'app-item';
        item.tabIndex = 0;

        const finalIconHTML = app.svg ? cleanSVG(app.svg) : `<span class="icon-fallback">${app.name.charAt(0)}</span>`;

        item.innerHTML = `
          <div class="icon-wrapper" style="background: ${app.bg || '#333'}; color: ${app.color || '#fff'};">
            ${finalIconHTML}
          </div>
          <div class="app-name">${app.name}</div>
        `;

        item.addEventListener('click', () => window.open(app.url, '_blank', 'noopener,noreferrer'));
        fragment.appendChild(item);
      });

      grid.appendChild(fragment);

      // Dock 激活项毛玻璃高亮联动
      document.querySelectorAll('.dock-item').forEach(el => {
        const isActive = el.dataset.key === categoryKey;
        el.style.opacity = isActive ? '1' : '0.55';
        el.style.background = isActive ? 'rgba(255, 255, 255, 0.25)' : 'none';
        el.style.borderRadius = '14px';
        el.style.transform = isActive ? 'scale(1.04)' : 'scale(1)';
      });
    }

    // 动态装配底部分类 Dock
    const dockFragment = document.createDocumentFragment();
    Object.keys(DATA).forEach(key => {
      const item = document.createElement('div');
      item.className = 'dock-item';
      item.dataset.key = key;
      item.innerHTML = `
        <div class="dock-icon-wrapper">
          <span class="dock-emoji">${DATA[key].short}</span>
          <span class="dock-name">${DATA[key].name}</span>
        </div>
      `;
      item.addEventListener('click', () => renderApps(key));
      dockFragment.appendChild(item);
    });
    dock.appendChild(dockFragment);

    // 默认开机载入
    renderApps('global');
  </script>
