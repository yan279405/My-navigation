<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>iPhone Home Screen Edition</title>
<style>
    :root {
        --bg-dark: #000000;
        --text-main: #ffffff;
        --text-secondary: #8e8e93;
        --accent: #0a84ff;
        /* iOS 标志性毛玻璃效果 */
        --glass-bg: rgba(255, 255, 255, 0.12);
        --glass-border: rgba(255, 255, 255, 0.15);
        --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        --app-radius: 22%; /* 完美的 iOS 图标圆角比例 */
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
        margin: 0;
        background: var(--bg-dark);
        color: var(--text-main);
        font-family: var(--font-stack);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        width: 100vw;
        user-select: none;
        align-items: center;
        justify-content: space-between;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
    }

    /* ==================== 1. 主屏幕 App 图标网格区 ==================== */
    .main {
        width: 100%;
        max-width: 480px; /* 锁死 iPhone Plus/Max 级别的黄金桌面视觉宽度 */
        flex: 1;
        overflow-y: auto;
        padding: 30px 24px 10px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        /* 隐藏滚动条，让它看起来更像原生 App */
        scrollbar-width: none; 
    }
    .main::-webkit-scrollbar { display: none; }
    
    .content-wrapper {
        width: 100%;
    }

    /* 顶部分类大标题，类似手机桌面顶部的 Widget 或时间小字 */
    h1#title { 
        margin: 0 0 32px 0; 
        font-size: 26px; 
        font-weight: 700; 
        letter-spacing: -0.5px;
        text-align: center;
        color: var(--text-main);
    }

    /* 严格的 iPhone 4列/5列 桌面网格 */
    .grid { 
        display: grid; 
        grid-template-columns: repeat(4, 1fr); /* 绝大多数 iPhone 一行放 4 个应用 */
        gap: 28px 16px; /* 上下间距大，左右紧凑 */
        width: 100%;
        justify-items: center;
    }
    
    /* 单个 App 容器 */
    .app-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        width: 100%;
        max-width: 72px;
    }
    .app-box:active .app-icon { transform: scale(0.85); filter: brightness(0.7); }
    
    /* 正方形 App 图标 */
    .app-icon {
        width: 60px;
        height: 60px;
        border-radius: var(--app-radius);
        background: linear-gradient(135deg, #2c2c2e, #1c1c1e);
        border: 1px solid rgba(255,255,255,0.05);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        transition: transform 0.2s, filter 0.2s;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    
    /* 图标下方的应用名称 */
    .app-name {
        margin-top: 6px;
        font-size: 11px;
        font-weight: 400;
        color: #ffffff;
        text-align: center;
        width: 100%;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        letter-spacing: 0.2px;
    }

    /* ==================== 2. 全新底部毛玻璃 Dock 栏 ==================== */
    .dock-container {
        width: 100%;
        max-width: 480px;
        padding: 0 16px 16px 16px; /* 留出底部横条安全距离 */
        display: flex;
        justify-content: center;
        box-sizing: border-box;
    }

    .dock {
        width: 100%;
        background: var(--glass-bg);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        border: 1px solid var(--glass-border);
        border-radius: 32px; /* iOS 标志性大圆角 Dock */
        padding: 12px 16px;
        display: flex;
        justify-content: space-around;
        align-items: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* Dock 栏里的常驻应用图标键 */
    .nav-item {
        width: 54px;
        height: 54px;
        border-radius: var(--app-radius);
        background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
        border: 1px solid rgba(255,255,255,0.1);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 600;
        color: #ffffff;
        transition: transform 0.2s;
        position: relative;
    }
    .nav-item:active { transform: scale(0.85); }
    
    /* 处于当前页面的高亮白点指示器 */
    .nav-item.active {
        box-shadow: 0 0 12px rgba(10, 132, 255, 0.3);
        border-color: var(--accent);
    }
    .nav-item.active::after {
        content: '';
        position: absolute;
        bottom: -6px;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #ffffff;
    }

    /* ==================== 小屏等比缩放适配 ==================== */
    @media (max-width: 390px) {
        .grid { gap: 20px 12px; }
        .app-icon { width: 54px; height: 54px; font-size: 24px; }
        .nav-item { width: 48px; height: 48px; }
        h1#title { font-size: 22px; margin-bottom: 24px; }
    }
</style>
</head>
<body>

<!-- 主屏幕 App 区域 -->
<main class="main">
    <div class="content-wrapper">
        <h1 id="title">国内平台</h1>
        <div class="grid" id="grid"></div>
    </div>
</main>

<!-- 底部常驻 Dock 栏 -->
<div class="dock-container">
    <nav class="dock" id="dock"></nav>
</div>

<script>
    // 数据源保持一致
    const DATA = {
        cn: { name: '国内平台', short: '国内', items: [
            {icon: "📺", name: "Bilibili", url: "https://space.bilibili.com"},
            {icon: "🎵", name: "抖音", url: "https://douyin.com"},
            {icon: "📕", name: "小红书", url: "https://xiaohongshu.com"},
            {icon: "⚡", name: "快手", url: "https://kuaishou.com"},
            {icon: "💬", name: "视频号", url: "#"},
            {icon: "🟠", name: "微博", url: "https://weibo.com"},
            {icon: "🔵", name: "知乎", url: "https://zhihu.com"},
            {icon: "🟢", name: "豆瓣", url: "https://douban.com"},
            {icon: "⚫", name: "即刻", url: "https://okjike.com"}
        ]},
        global: { name: '国际平台', short: '国际', items: [
            {icon: "▶", name: "YouTube", url: "https://youtube.com"},
            {icon: "f", name: "Facebook", url: "https://facebook.com"},
            {icon: "𝕏", name: "X", url: "https://x.com"},
            {icon: "📷", name: "Instagram", url: "https://instagram.com"},
            {icon: "@", name: "Threads", url: "https://threads.net"},
            {icon: "♫", name: "TikTok", url: "https://tiktok.com"},
            {icon: "✈", name: "Telegram", url: "https://telegram.org"},
            {icon: "🎮", name: "Discord", url: "https://discord.com"},
            {icon: "👽", name: "Reddit", url: "https://reddit.com"},
            {icon: "💼", name: "LinkedIn", url: "https://linkedin.com"}
        ]},
        media: { name: '流媒体', short: '媒体', items: [
            {icon: "N", name: "Netflix", url: "https://netflix.com"},
            {icon: "🍎", name: "Apple TV+", url: "https://tv.apple.com"},
            {icon: "D", name: "Disney+", url: "https://disneyplus.com"},
            {icon: "P", name: "Prime Video", url: "https://primevideo.com"},
            {icon: "H", name: "HBO Max", url: "https://max.com"},
            {icon: "♪", name: "Spotify", url: "https://spotify.com"},
            {icon: "🎵", name: "Music", url: "https://music.apple.com"}
        ]},
        news: { name: '日常资讯', short: '资讯', items: [
            {icon: "📰", name: "澎湃新闻", url: "https://www.thepaper.cn"},
            {icon: "📰", name: "纽约时报", url: "https://nytimes.com"},
            {icon: "📺", name: "CNN", url: "https://www.cnn.com"},
            {icon: "🦊", name: "Fox News", url: "https://www.foxnews.com"},
            {icon: "🗞️", name: "华盛顿邮报", url: "https://www.washingtonpost.com"},
            {icon: "🇬🇧", name: "BBC News", url: "https://www.bbc.com/zhongwen/simp"},
            {icon: "⚡", name: "Yahoo", url: "https://news.yahoo.com"},
            {icon: "📰", name: "Google", url: "https://news.google.com"}
        ]}
    };

    const dock = document.getElementById('dock');

    // 核心渲染主屏幕网格
    function render(key) {
        const data = DATA[key];
        document.getElementById('title').innerText = data.name;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.key === key));
        const grid = document.getElementById('grid');
        
        // 生成纯正的 iPhone 图标流
        grid.innerHTML = data.items.map(item => `
            <div class="app-box" onclick="window.open('${item.url}', '_blank')">
                <div class="app-icon">${item.icon}</div>
                <div class="app-name">${item.name}</div>
            </div>
        `).join('');
    }

    // 动态在底部 Dock 生成 4 个主常驻应用分类
    Object.keys(DATA).forEach(key => {
        const item = document.createElement('div');
        item.className = 'nav-item';
        item.dataset.key = key;
        item.innerHTML = `${DATA[key].short}`;
        item.onclick = () => render(key);
        dock.appendChild(item);
    });

    // 首次进入主页默认加载第一页
    render('cn'); 
</script>
</body>
</html>
