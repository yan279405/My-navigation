<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>二哥 · Matrix OS</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "PingFang SC",
        sans-serif;

    background:#020617;

    color:#fff;

    overflow:hidden;
}

/* 星空背景 */

body:before{

    content:"";

    position:fixed;

    inset:0;

    background:
        radial-gradient(circle at 20% 20%,rgba(56,189,248,.18),transparent 30%),
        radial-gradient(circle at 80% 10%,rgba(99,102,241,.18),transparent 30%),
        radial-gradient(circle at 50% 80%,rgba(14,165,233,.10),transparent 40%);

    filter:blur(40px);

    z-index:-1;
}

/* 总布局 */

.app{

    display:flex;

    height:100vh;
}

/* 左侧 */

.sidebar{

    width:320px;

    background:
        rgba(15,23,42,.85);

    backdrop-filter:
        blur(30px);

    padding:30px;

    border-right:
        1px solid rgba(255,255,255,.08);
}

.avatar{

    width:100px;
    height:100px;

    border-radius:50%;

    background:
        linear-gradient(
            135deg,
            #38bdf8,
            #6366f1
        );

    margin:auto;
}

.profile{

    text-align:center;

    margin-bottom:40px;
}

.profile h1{

    margin-top:15px;
}

.profile p{

    color:#94a3b8;

    margin-top:5px;
}

/* 导航 */

.menu{

    display:flex;

    flex-direction:column;

    gap:12px;
}

.item{

    padding:18px;

    border-radius:16px;

    background:
        rgba(255,255,255,.04);

    cursor:pointer;

    transition:.3s;
}

.item:hover{

    transform:
        translateX(8px);
}

.active{

    background:
        rgba(56,189,248,.25);

    border:
        1px solid #38bdf8;
}

/* 右侧 */

.main{

    flex:1;

    overflow:auto;

    padding:40px;
}

.page{

    display:none;

    animation:
        fade .3s;
}

.page.active{

    display:block;
}

@keyframes fade{

    from{
        opacity:0;
        transform:
            translateY(20px);
    }

    to{
        opacity:1;
        transform:none;
    }
}

/* 通用卡片 */

.card{

    background:
        rgba(255,255,255,.05);

    backdrop-filter:
        blur(20px);

    border:
        1px solid rgba(255,255,255,.08);

    border-radius:24px;

    overflow:hidden;

    margin-bottom:30px;
}

/* B站 */

.bili-banner{

    height:220px;

    background:
        linear-gradient(
            135deg,
            #00a1d6,
            #3b82f6
        );
}

.bili-content{

    padding:30px;
}

/* 小红书 */

.xhs-banner{

    height:220px;

    background:
        linear-gradient(
            135deg,
            #ff2442,
            #ff7a8f
        );
}

/* 抖音 */

.dy-banner{

    height:220px;

    background:
        linear-gradient(
            135deg,
            #111,
            #333
        );
}

/* YouTube */

.yt-banner{

    height:220px;

    background:
        linear-gradient(
            135deg,
            #ff0000,
            #b91c1c
        );
}

/* X */

.x-banner{

    height:220px;

    background:
        linear-gradient(
            135deg,
            #111827,
            #374151
        );
}

/* 数据 */

.stats{

    display:flex;

    gap:30px;

    margin:25px 0;
}

.stat b{

    display:block;

    font-size:28px;
}

/* 作品墙 */

.gallery{

    display:grid;

    grid-template-columns:
        repeat(4,1fr);

    gap:20px;
}

.work{

    height:180px;

    border-radius:16px;

    background:
        rgba(255,255,255,.06);

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:40px;

    transition:.3s;
}

.work:hover{

    transform:
        scale(1.05);
}

.btn{

    display:inline-block;

    padding:14px 30px;

    background:#38bdf8;

    color:black;

    border-radius:12px;

    text-decoration:none;

    font-weight:bold;
}

</style>
</head>

<body>

<div class="app">

    <aside class="sidebar">

        <div class="profile">

            <div class="avatar"></div>

            <h1>二哥</h1>

            <p>
                旅行 × 人文 × 纪录片
            </p>

        </div>

        <div class="menu">

            <div class="item active"
                 onclick="show('bili',this)">
                 📺 Bilibili
            </div>

            <div class="item"
                 onclick="show('xhs',this)">
                 📕 小红书
            </div>

            <div class="item"
                 onclick="show('dy',this)">
                 🎵 抖音
            </div>

            <div class="item"
                 onclick="show('yt',this)">
                 ▶ YouTube
            </div>

            <div class="item"
                 onclick="show('x',this)">
                 ✖ X
            </div>

        </div>

    </aside>

    <main class="main">

        <!-- B站 -->

        <div class="page active" id="bili">

            <div class="card">

                <div class="bili-banner"></div>

                <div class="bili-content">

                    <h1>📺 我的Bilibili主页</h1>

                    <div class="stats">

                        <div class="stat">
                            <b>12.3W</b>
                            粉丝
                        </div>

                        <div class="stat">
                            <b>326</b>
                            视频
                        </div>

                        <div class="stat">
                            <b>890W</b>
                            播放
                        </div>

                    </div>

                    <a
                      class="btn"
                      target="_blank"
                      href="https://space.bilibili.com/你的UID">

                      进入B站主页

                    </a>

                </div>

            </div>

            <div class="gallery">

                <div class="work">🎬</div>
                <div class="work">🌄</div>
                <div class="work">🚂</div>
                <div class="work">🌾</div>

            </div>

        </div>

        <!-- 小红书 -->

        <div class="page" id="xhs">

            <div class="card">

                <div class="xhs-banner"></div>

                <div class="bili-content">

                    <h1>📕 我的小红书主页</h1>

                    <div class="stats">

                        <div class="stat">
                            <b>8.5W</b>
                            粉丝
                        </div>

                        <div class="stat">
                            <b>588</b>
                            笔记
                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- 抖音 -->

        <div class="page" id="dy">

            <div class="card">

                <div class="dy-banner"></div>

                <div class="bili-content">

                    <h1>🎵 我的抖音主页</h1>

                </div>

            </div>

        </div>

        <!-- YouTube -->

        <div class="page" id="yt">

            <div class="card">

                <div class="yt-banner"></div>

                <div class="bili-content">

                    <h1>▶ 我的YouTube主页</h1>

                </div>

            </div>

        </div>

        <!-- X -->

        <div class="page" id="x">

            <div class="card">

                <div class="x-banner"></div>

                <div class="bili-content">

                    <h1>✖ 我的X主页</h1>

                </div>

            </div>

        </div>

    </main>

</div>

<script>

function show(id,el){

    document
        .querySelectorAll('.page')
        .forEach(p=>
            p.classList.remove('active'));

    document
        .querySelectorAll('.item')
        .forEach(p=>
            p.classList.remove('active'));

    document
        .getElementById(id)
        .classList.add('active');

    el.classList.add('active');
}

</script>

</body>
</html>
