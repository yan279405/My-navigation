<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Creator Hub OS26 | Spatial Experience</title>

<style>
/* =========================================
   1. 设计系统 (Apple Spatial Design Tokens)
   ========================================= */
:root {
    --bg-dark: #000000;
    --glass-base: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-highlight: rgba(255, 255, 255, 0.15);
    
    --text-primary: rgba(255, 255, 255, 0.95);
    --text-secondary: rgba(255, 255, 255, 0.55);
    
    --apple-ease: cubic-bezier(0.25, 1, 0.5, 1);
    --spring-ease: cubic-bezier(0.175, 0.885, 0.32, 1.2);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background-color: var(--bg-dark);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
    overflow: hidden; /* 禁用原生滚动，打造沉浸式 App 体验 */
    -webkit-font-smoothing: antialiased;
}

/* =========================================
   2. 动态液态背景 (Liquid Mesh Gradient)
   ========================================= */
.ambient-bg {
    position: fixed;
    inset: -20%;
    z-index: 0;
    background: 
        radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.4), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(99, 102, 241, 0.4), transparent 40%),
        radial-gradient(circle at 50% 80%, rgba(139, 92, 246, 0.4), transparent 40%);
    filter: blur(80px);
    animation: liquidFlow 20s infinite alternate var(--apple-ease);
    pointer-events: none;
}

@keyframes liquidFlow {
    0% { transform: rotate(0deg) scale(1); }
    100% { transform: rotate(15deg) scale(1.1) translate(5%, 5%); }
}

/* 鼠标跟随全局主光源 */
#global-light {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 1;
    mix-blend-mode: screen;
}

/* =========================================
   3. 核心布局 (iPadOS / VisionOS Layout)
   ========================================= */
.os-container {
    position: relative;
    z-index: 2;
    display: flex;
    width: 100vw;
    height: 100vh;
    padding: 20px;
    gap: 20px;
}

/* 左侧控制中心 (Sidebar) */
.sidebar {
    width: 280px;
    border-radius: 32px;
    background: var(--glass-base);
    backdrop-filter: blur(60px) saturate(180%);
    -webkit-backdrop-filter: blur(60px) saturate(180%);
    border: 1px solid var(--glass-border);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05), 0 20px 40px rgba(0,0,0,0.3);
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
}

.user-profile {
    text-align: center;
    margin-bottom: 40px;
}

.avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a855f7, #3b82f6);
    margin: 0 auto 16px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2), inset 0 2px 4px rgba(255,255,255,0.3);
}

.menu-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.menu-item {
    padding: 16px 20px;
    border-radius: 20px;
    border: 1px solid transparent;
    color: var(--text-secondary);
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s var(--apple-ease);
    display: flex;
    align-items: center;
    gap: 12px;
}

.menu-item:hover {
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-primary);
}

.menu-item.active {
    background: rgba(255, 255, 255, 0.1);
    color: var(--text-primary);
    border-color: var(--glass-highlight);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.2);
}

/* 右侧工作区 */
.workspace {
    flex: 1;
    border-radius: 32px;
    background: var(--glass-base);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid var(--glass-border);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    padding: 40px;
    overflow-y: auto;
    scroll-behavior: smooth;
}

.workspace::-webkit-scrollbar { width: 0; } /* 隐藏滚动条更沉浸 */

.hero-title {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 40px;
    background: linear-gradient(180deg, #fff, rgba(255,255,255,0.5));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* =========================================
   4. VisionOS 3D 卡片系统
   ========================================= */
.grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 24px;
    perspective: 1200px; /* 为子元素开启 3D 空间 */
}

.vision-card {
    position: relative;
    height: 160px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    padding: 24px;
    cursor: pointer;
    transform-style: preserve-3d; /* 保持 3D 景深 */
    transition: transform 0.4s var(--apple-ease), box-shadow 0.4s var(--apple-ease);
    /* 基础阴影 */
    box-shadow: 0 10px 30px rgba(0,0,0,0.1), inset 0 1px 1px rgba(255,255,255,0.1);
}

/* 内部内容层 - 悬浮时产生视差 */
.card-content {
    position: relative;
    z-index: 2;
    transform: translateZ(30px); /* 向 Z 轴突起 */
    transition: transform 0.3s var(--apple-ease);
}

.card-icon {
    font-size: 32px;
    margin-bottom: 12px;
}

.card-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 6px;
}

.card-sub {
    font-size: 14px;
    color: var(--text-secondary);
}

/* 动态光斑 (Glare) 层 */
.glare-container {
    position: absolute;
    inset: 0;
    border-radius: 24px;
    overflow: hidden;
    z-index: 1;
    pointer-events: none;
}

.glare {
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.15), transparent 50%);
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity 0.3s;
}

.vision-card:hover .glare { opacity: 1; }

/* =========================================
   5. 响应式布局 (iPhoneOS 适配)
   ========================================= */
@media (max-width: 850px) {
    .os-container {
        flex-direction: column;
        padding: 0;
        gap: 0;
        background: var(--bg-dark);
    }
    
    .sidebar {
        width: 100%;
        border-radius: 0 0 32px 32px;
        padding: 40px 20px 20px;
        border-top: none;
        border-left: none;
        border-right: none;
        z-index: 10;
    }
    
    .menu-list {
        flex-direction: row;
        overflow-x: auto;
        padding-bottom: 10px;
    }
    
    .menu-item {
        white-space: nowrap;
        padding: 12px 20px;
    }
    
    .workspace {
        border-radius: 0;
        border: none;
        padding: 30px 20px;
        background: transparent;
        backdrop-filter: none;
    }
}
</style>
</head>
<body>

<div class="ambient-bg"></div>
<div id="global-light"></div>

<div class="os-container">
    <aside class="sidebar">
        <div class="user-profile">
            <div class="avatar"></div>
            <h2 style="font-weight: 600;">昵称</h2>
            <p style="color: var(--text-secondary); font-size: 14px; margin-top: 6px;">Creator Hub</p>
        </div>
        
        <nav class="menu-list">
            <div class="menu-item active" data-type="cn">📺 国内矩阵</div>
            <div class="menu-item" data-type="global">▶ 国际平台</div>
            <div class="menu-item" data-type="media">♪ 流媒体</div>
            <div class="menu-item" data-type="business">💼 商务合作</div>
        </nav>
    </aside>

    <main class="workspace">
        <h1 class="hero-title" id="page-title">国内平台矩阵</h1>
        <div class="grid-container" id="grid-render">
            </div>
    </main>
</div>

<script>
// =========================================
// 1. 数据配置
// =========================================
const DATA = {
    cn: [
        {icon: "📺", name: "Bilibili", desc: "中国视频创作平台", url: "https://space.bilibili.com"},
        {icon: "📕", name: "小红书", desc: "旅行与生活记录", url: "https://xiaohongshu.com"},
        {icon: "🎵", name: "抖音", desc: "短纪录片频道", url: "https://douyin.com"},
        {icon: "⚡", name: "快手", desc: "短视频平台", url: "https://kuaishou.com"},
        {icon: "💬", name: "微信视频号", desc: "微信生态创作", url: "#"}
    ],
    global: [
        {icon: "▶", name: "YouTube", desc: "全球视频平台", url: "https://youtube.com"},
        {icon: "𝕏", name: "X", desc: "国际社交平台", url: "https://x.com"},
        {icon: "📷", name: "Instagram", desc: "图片社交平台", url: "https://instagram.com"},
        {icon: "👽", name: "Reddit", desc: "国际论坛互动", url: "https://reddit.com"}
    ],
    media: [
        {icon: "N", name: "Netflix", desc: "流媒体影视", url: "https://netflix.com"},
        {icon: "🍎", name: "Apple TV+", desc: "原创高品质剧集", url: "https://tv.apple.com"},
        {icon: "♪", name: "Spotify", desc: "播客与音乐库", url: "https://spotify.com"}
    ],
    business: [
        {icon: "💼", name: "商务合作", desc: "联系邮箱/合作", url: "mailto:example@email.com"},
        {icon: "📊", name: "Media Kit", desc: "创作者数据看板", url: "#"}
    ]
};

const pageTitles = {
    cn: "国内平台矩阵",
    global: "国际社交平台",
    media: "流媒体与订阅",
    business: "商业合作与数据"
};

// =========================================
// 2. 页面渲染与逻辑
// =========================================
const gridContainer = document.getElementById('grid-render');
const menuItems = document.querySelectorAll('.menu-item');
const pageTitle = document.getElementById('page-title');

function renderCards(type) {
    gridContainer.innerHTML = '';
    pageTitle.textContent = pageTitles[type];
    
    DATA[type].forEach(item => {
        const card = document.createElement('div');
        card.className = 'vision-card';
        card.innerHTML = `
            <div class="glare-container"><div class="glare"></div></div>
            <div class="card-content">
                <div class="card-icon">${item.icon}</div>
                <div class="card-title">${item.name}</div>
                <div class="card-sub">${item.desc}</div>
            </div>
        `;
        
        card.onclick = () => window.open(item.url, "_blank");
        gridContainer.appendChild(card);
    });

    // 每次渲染完毕后，重新绑定 3D 悬浮事件
    initVision3DEffect();
}

// 菜单切换事件
menuItems.forEach(item => {
    item.addEventListener('click', () => {
        menuItems.forEach(m => m.classList.remove('active'));
        item.classList.add('active');
        // 加入简单的透明度过度动画
        gridContainer.style.opacity = 0;
        setTimeout(() => {
            renderCards(item.dataset.type);
            gridContainer.style.opacity = 1;
            gridContainer.style.transition = "opacity 0.4s var(--apple-ease)";
        }, 150);
    });
});

// 初始化首屏
renderCards('cn');

// =========================================
// 3. Apple VisionOS 3D 空间计算交互 (纯 JS 实现)
// =========================================
function initVision3DEffect() {
    const cards = document.querySelectorAll('.vision-card');
    
    cards.forEach(card => {
        const glare = card.querySelector('.glare');
        
        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left; // 鼠标在卡片内的 X 坐标
            const y = e.clientY - rect.top;  // 鼠标在卡片内的 Y 坐标
            
            // 计算旋转角度 (系数控制旋转幅度，越大越平缓)
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = ((y - centerY) / centerY) * -10; // 上下翻转
            const rotateY = ((x - centerX) / centerX) * 10;  // 左右翻转
            
            // 应用 3D 变换
            card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
            card.style.boxShadow = `
                ${-rotateY}px ${rotateX + 15}px 30px rgba(0,0,0,0.2), 
                inset 0 1px 1px rgba(255,255,255,0.2)
            `;
            
            // 控制光斑移动
            glare.style.left = `${x}px`;
            glare.style.top = `${y}px`;
        });
        
        // 鼠标离开时恢复原状 (带弹性动画)
        card.addEventListener('mouseleave', () => {
            card.style.transform = `perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1)`;
            card.style.boxShadow = `0 10px 30px rgba(0,0,0,0.1), inset 0 1px 1px rgba(255,255,255,0.1)`;
        });
    });
}

// =========================================
// 4. 全局液态环境光跟随
// =========================================
const globalLight = document.getElementById('global-light');
document.addEventListener('mousemove', (e) => {
    // 使用 requestAnimationFrame 保证丝滑不掉帧
    requestAnimationFrame(() => {
        globalLight.style.left = `${e.clientX}px`;
        globalLight.style.top = `${e.clientY}px`;
    });
});
</script>
</body>
</html>
