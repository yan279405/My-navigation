<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>二哥 · Matrix V2</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020617;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC";
    overflow:hidden;
}

/* 星空 */

#bg{
    position:fixed;
    inset:0;
    z-index:-3;
}

/* 鼠标流光 */

.glow{

    position:fixed;

    width:500px;
    height:500px;

    border-radius:50%;

    background:
        radial-gradient(
            rgba(56,189,248,.15),
            transparent
        );

    filter:blur(70px);

    pointer-events:none;

    z-index:-2;
}

/* 布局 */

.wrapper{
    display:flex;
    height:100vh;
}

/* 左侧 */

.sidebar{

    width:320px;

    padding:30px;

    background:
        rgba(15,23,42,.75);

    backdrop-filter:
        blur(30px);

    border-right:
        1px solid rgba(255,255,255,.08);
}

.avatar{

    width:100px;
    height:100px;

    border-radius:50%;

    margin:auto;

    background:
        linear-gradient(
            135deg,
            #38bdf8,
            #6366f1
        );

    box-shadow:
        0 0 40px
        rgba(56,189,248,.4);
}

.profile{
    text-align:center;
}

.profile h1{
    margin:15px 0 5px;
}

.profile p{
    color:#94a3b8;
}

/* 导航 */

.nav{
    margin-top:40px;
}

.nav-item{

    padding:18px;

    margin-bottom:10px;

    border-radius:16px;

    background:
        rgba(255,255,255,.04);

    cursor:pointer;

    transition:.3s;
}

.nav-item:hover{

    transform:
        translateX(8px);

    background:
        rgba(56,189,248,.2);
}

.active{

    border:
        1px solid #38bdf8;
}

/* 主体 */

.main{

    flex:1;

    padding:40px;

    overflow:auto;
}

/* Hero */

.hero{

    height:300px;

    border-radius:30px;

    background:
        linear-gradient(
            135deg,
            #38bdf8,
            #6366f1
        );

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:120px;

    margin-bottom:30px;

    box-shadow:
        0 20px 60px
        rgba(0,0,0,.5);
}

/* 数据 */

.dashboard{

    display:flex;

    gap:20px;

    margin-bottom:30px;
}

.metric{

    flex:1;

    padding:25px;

    background:
        rgba(255,255,255,.05);

    backdrop-filter:
        blur(20px);

    border-radius:20px;
}

.metric b{

    display:block;

    font-size:32px;

    margin-bottom:10px;
}

/* 作品墙 */

.gallery{

    display:grid;

    grid-template-columns:
        repeat(4,1fr);

    gap:20px;
}

.poster{

    height:240px;

    border-radius:20px;

    background:
        linear-gradient(
            135deg,
            #1e3a8a,
            #0f172a
        );

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:50px;

    transition:.3s;
}

.poster:hover{

    transform:
        scale(1.05);
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="glow" id="glow"></div>

<div class="wrapper">

    <aside class="sidebar">

        <div class="profile">

            <div class="avatar"></div>

            <h1>二哥</h1>

            <p>
                旅行 × 人文 × 纪录片
            </p>

        </div>

        <div class="nav">

            <div class="nav-item active">
                📺 Bilibili
            </div>

            <div class="nav-item">
                📕 小红书
            </div>

            <div class="nav-item">
                🎵 抖音
            </div>

            <div class="nav-item">
                ▶ YouTube
            </div>

            <div class="nav-item">
                ✖ X
            </div>

        </div>

    </aside>

    <main class="main">

        <div class="hero">
            📺
        </div>

        <div class="dashboard">

            <div class="metric">
                <b>12.3W</b>
                粉丝
            </div>

            <div class="metric">
                <b>326</b>
                视频
            </div>

            <div class="metric">
                <b>890W</b>
                播放
            </div>

            <div class="metric">
                <b>+23%</b>
                月增长
            </div>

        </div>

        <div class="gallery">

            <div class="poster">🎬</div>

            <div class="poster">🌄</div>

            <div class="poster">🚂</div>

            <div class="poster">🏔</div>

            <div class="poster">🌾</div>

            <div class="poster">🌊</div>

            <div class="poster">🏕</div>

            <div class="poster">🛶</div>

        </div>

    </main>

</div>

<script>

/* 鼠标流光 */

document.addEventListener(
'mousemove',
e=>{

    glow.style.left=
        e.clientX-250+'px';

    glow.style.top=
        e.clientY-250+'px';
});

/* 星空 */

const c=
document.getElementById('bg');

const ctx=
c.getContext('2d');

c.width=
innerWidth;

c.height=
innerHeight;

let stars=[];

for(let i=0;i<150;i++){

    stars.push({

        x:Math.random()*c.width,

        y:Math.random()*c.height,

        r:Math.random()*2
    });
}

function draw(){

    ctx.clearRect(
        0,0,
        c.width,
        c.height
    );

    ctx.fillStyle=
        "white";

    stars.forEach(s=>{

        ctx.beginPath();

        ctx.arc(
            s.x,
            s.y,
            s.r,
            0,
            Math.PI*2
        );

        ctx.fill();

        s.y+=0.1;

        if(s.y>c.height)
            s.y=0;
    });

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
