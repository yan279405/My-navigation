<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Creator Hub OS26</title>
<style>
    :root {
        --bg-dark: #000000;
        --sidebar-bg: rgba(28, 28, 30, 0.8);
        --text-main: #ffffff;
        --text-secondary: #8e8e93;
        --accent: #0a84ff;
        --glass-border: rgba(255, 255, 255, 0.1);
        --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
        margin: 0;
        background: var(--bg-dark);
        color: var(--text-main);
        font-family: var(--font-stack);
        height: 100vh;
        display: flex; /* 默认横屏/桌面布局 */
        overflow: hidden;
    }

    /* 侧边栏：适配 iPad/Mac */
    .sidebar {
        width: 280px;
        background: var(--sidebar-bg);
        backdrop-filter: blur(30px);
        border-right: 1px solid var(--glass-border);
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow-y: auto;
        flex-shrink: 0;
    }

    .profile-zone { text-align: center; margin-bottom: 20px; }
    .avatar { width: 80px; height: 80px; border-radius: 20px; background: #333; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; }
    
    .nav-item {
        padding: 14px 18px;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
        color: var(--text-secondary);
        white-space: nowrap;
    }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
    .nav-item.active { background: var(--accent); color: white; font-weight: 600; }

    /* 主内容区 */
    .main {
        flex: 1;
        overflow-y: auto;
        padding: 40px;
    }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .card {
        background: rgba(255,255,255,0.05);
        padding: 20px;
        border-radius: 16px;
        border: 1px solid var(--glass-border);
        cursor: pointer;
        transition: 0.2s;
    }
    .card:hover { background: rgba(255,255,255,0.1); }

    /* 移动端/窄屏适配 */
    @media (max-width: 768px) {
        body { flex-direction: column; }
        .sidebar {
            width: 100%;
            height: auto;
            flex-direction: row;
            overflow-x: auto;
            border-right: none;
            border-bottom: 1px solid var(--glass-border);
            padding: 15px;
            gap: 10px;
            flex-shrink: 0;
        }
        .profile-zone { display: none; } /* 移动端隐藏头像以节省空间 */
        .main { padding: 20px; }
    }
</style>
</head>
<body>

<nav class="sidebar" id="sidebar"></nav>

<main class="main">
    <h1 id="title" style="margin-bottom: 20px;">Creator Hub</h1>
    <div class="grid" id="grid"></div>
</main>

<script>
    // 数据结构保持不变 [cite: 23-33]
    const DATA = {
        cn: { name: '国内平台', items: [{icon: "📺", name: "Bilibili", desc: "中国视频创作平台", url: "https://space.bilibili.com"}, {icon: "📕", name: "小红书", desc: "旅行与生活记录", url: "https://xiaohongshu.com"}] },
        global: { name: '国际平台', items: [{icon: "▶", name: "YouTube", desc: "全球视频平台", url: "https://youtube.com"}, {icon: "𝕏", name: "X", desc: "国际社交平台", url: "https://x.com"}] },
        media: { name: '流媒体', items: [{icon: "N", name: "Netflix", desc: "流媒体影视", url: "https://netflix.com"}] },
        news: { name: '资讯', items: [{icon: "📰", name: "澎湃新闻", desc: "时事要闻", url: "https://www.thepaper.cn"}] }
    };

    function render(key) {
        const data = DATA[key];
        document.getElementById('title').innerText = data.name;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.key === key));
        const grid = document.getElementById('grid');
        grid.innerHTML = data.items.map(item => `
            <div class="card" onclick="window.open('${item.url}', '_blank')">
                <div style="font-size: 24px; margin-bottom: 10px;">${item.icon}</div>
                <div style="font-weight: 600;">${item.name}</div>
                <div style="font-size: 13px; color: var(--text-secondary); margin-top: 4px;">${item.desc}</div>
            </div>
        `).join('');
    }

    const sidebar = document.getElementById('sidebar');
    // 添加头像区域 [cite: 38]
    sidebar.innerHTML = `
        <div class="profile-zone">
            <div class="avatar"></div>
            <div style="font-weight: 600;">颜途的视界</div>
        </div>
    `;
    
    // 生成菜单 [cite: 39]
    Object.keys(DATA).forEach(key => {
        const item = document.createElement('div');
        item.className = 'nav-item';
        item.dataset.key = key;
        item.innerText = DATA[key].name;
        item.onclick = () => render(key);
        sidebar.appendChild(item);
    });

    render('cn'); 
</script>
</body>
</html>
