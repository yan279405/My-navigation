<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Creator Hub OS26</title>
<style>
    :root {
        --bg-dark: #000000;
        --glass-bg: rgba(20, 20, 20, 0.95);
        --text-main: #ffffff;
        --text-secondary: #8e8e93;
        --accent: #ff453a;
        --glass-border: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
        margin: 0;
        background: var(--bg-dark);
        color: var(--text-main);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
    }

    /* 顶部滚动菜单 */
    .top-scroll-nav {
        position: fixed;
        top: 0; width: 100%; height: 50px;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        display: flex; align-items: center;
        overflow-x: auto; white-space: nowrap;
        padding: 0 10px;
        scrollbar-width: none;
        z-index: 100;
        border-bottom: 1px solid var(--glass-border);
    }
    .top-scroll-nav::-webkit-scrollbar { display: none; }
    .tab-item {
        padding: 0 15px; color: var(--text-secondary); cursor: pointer;
        font-size: 15px; height: 100%; display: flex; align-items: center;
    }
    .tab-item.active { color: white; font-weight: 700; border-bottom: 2px solid white; }

    /* 主内容区 */
    .main { flex: 1; overflow-y: auto; padding: 70px 20px 90px 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .card {
        background: rgba(255,255,255,0.05); padding: 20px; border-radius: 16px;
        border: 1px solid var(--glass-border); cursor: pointer;
    }

    /* 底部固定菜单 */
    .bottom-nav {
        position: fixed; bottom: 0; width: 100%; height: 65px;
        background: var(--glass-bg);
        display: flex; justify-content: space-around; align-items: center;
        padding-bottom: env(safe-area-inset-bottom);
        border-top: 1px solid var(--glass-border);
        z-index: 100;
    }
    .nav-btn { display: flex; flex-direction: column; align-items: center; color: var(--text-secondary); font-size: 11px; }
    .nav-btn.active { color: white; }
    .add-icon { 
        width: 40px; height: 30px; background: white; color: black; 
        border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px;
    }
</style>
</head>
<body>

<div class="top-scroll-nav" id="topNav"></div>

<main class="main">
    <div class="grid" id="grid"></div>
</main>

<div class="bottom-nav">
    <div class="nav-btn active"><span>首页</span></div>
    <div class="nav-btn"><span>视频</span></div>
    <div class="add-icon">+</div>
    <div class="nav-btn"><span>商城</span></div>
    <div class="nav-btn"><span>我的</span></div>
</div>

    // 渲染顶部滚动菜单
    const topNav = document.getElementById('topNav');
    Object.keys(DATA).forEach(key => {
        const div = document.createElement('div');
        div.className = `tab-item ${key === 'cn' ? 'active' : ''}`;
        div.innerText = DATA[key].name;
        div.onclick = () => {
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            div.classList.add('active');
            render(key);
        };
        topNav.appendChild(div);
    });

    function render(key) {
        const grid = document.getElementById('grid');
        grid.innerHTML = DATA[key].items.map(item => `
            <div class="card" onclick="window.open('${item.url}', '_blank')">
                <div style="font-size: 20px;">${item.icon} ${item.name}</div>
                <div style="font-size: 12px; color: var(--text-secondary);">${item.desc}</div>
            </div>
        `).join('');
    }

    render('cn');
</script>
</body>
</html>
