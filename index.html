<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>颜哥｜全平台聚合官网</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    height:100%;
    overflow:hidden;
    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "PingFang SC",
    sans-serif;
}

body{
    background:
    linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #1e293b,
        #312e81
    );
    background-size:400% 400%;
    animation:bg 18s ease infinite;
    color:#fff;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* 左侧 */

.sidebar{
    position:fixed;
    left:0;
    top:0;

    width:300px;
    height:100vh;

    padding:30px;

    background:
    rgba(15,23,42,.75);

    backdrop-filter:
    blur(25px);

    border-right:
    1px solid rgba(255,255,255,.08);
}

.avatar{
    width:120px;
    height:120px;

    margin:auto;

    border-radius:50%;

    background:
    linear-gradient(
        135deg,
        #38bdf8,
        #6366f1
    );

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:45px;
    font-weight:700;

    box-shadow:
    0 20px 60px
    rgba(56,189,248,.3);
}

.username{
    text-align:center;
    font-size:32px;
    font-weight:700;
    margin-top:20px;
}

.bio{
    text-align:center;
    color:#94a3b8;
    line-height:1.8;
    margin-top:10px;
}

.line{
    margin:30px 0;
    height:1px;
    background:
    rgba(255,255,255,.08);
}

.nav{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.nav button{
    border:none;

    background:
    rgba(30,41,59,.55);

    backdrop-filter:
    blur(20px);

    border-radius:18px;

    padding:18px;

    color:white;

    cursor:pointer;

    text-align:left;

    font-size:16px;

    transition:.3s;
}

.nav button:hover{
    transform:
    translateX(8px);
}

.nav button.active{
    background:
    linear-gradient(
        135deg,
        #38bdf8,
        #6366f1
    );

    box-shadow:
    0 10px 30px
    rgba(56,189,248,.35);
}

/* 右侧 */

.main{
    margin-left:300px;

    width:
    calc(100vw - 300px);

    height:100vh;

    overflow:auto;

    padding:30px;
}

.panel{
    display:none;

    min-height:
    calc(100vh - 60px);

    background:
    rgba(15,23,42,.55);

    backdrop-filter:
    blur(25px);

    border-radius:30px;

    padding:40px;

    animation:fade .35s;
}

.panel.active{
    display:block;
}

@keyframes fade{
    from{
        opacity:0;
        transform:
        translateY(20px);
    }
    to{
        opacity:1;
        transform:none;
    }
}

/* HERO */

.hero{
    height:240px;

    border-radius:28px;

    padding:50px;

    display:flex;
    align-items:center;

    box-shadow:
    0 20px 60px
    rgba(0,0,0,.3);
}

.hero-title{
    font-size:50px;
    font-weight:700;
}

.hero-sub{
    margin-top:15px;
    font-size:20px;
    opacity:.9;
}

.card{
    margin-top:40px;

    background:
    rgba(30,41,59,.55);

    padding:40px;

    border-radius:25px;

    line-height:2;
}

.card h2{
    margin-bottom:20px;
}

.card p{
    color:#cbd5e1;
}

.visit{
    display:inline-block;

    margin-top:40px;

    padding:18px 40px;

    border-radius:18px;

    background:
    linear-gradient(
        135deg,
        #38bdf8,
        #6366f1
    );

    color:#fff;

    text-decoration:none;

    font-weight:700;

    transition:.3s;
}

.visit:hover{
    transform:
    translateY(-3px);
}

@media(max-width:900px){

    body{
        overflow:auto;
    }

    .sidebar{
        position:relative;
        width:100%;
        height:auto;
    }

    .main{
        width:100%;
        margin-left:0;
        height:auto;
    }
}
</style>
</head>

<body>

<div class="sidebar">

    <div class="avatar">
        颜
    </div>

    <div class="username">
        颜哥
    </div>

    <div class="bio">
        旅行 · 人文 · 纪录片创作者
        <br>
        全平台内容创作
    </div>

    <div class="line"></div>

    <div class="nav" id="nav"></div>

</div>

<div class="main">
    <div id="content"></div>
</div>

<script>

const DATA=[

{
    id:"bili",
    icon:"📺",
    name:"Bilibili",
    color:"#00A1D6",
    intro:"旅行人文纪录片创作者",
    url:"https://space.bilibili.com/506524109?spm_id_from=333.337.0.0"
},

{
    id:"xhs",
    icon:"📕",
    name:"小红书",
    color:"#FF2442",
    intro:"旅行摄影与生活记录",
    url:"https://www.xiaohongshu.com/"
},

{
    id:"dy",
    icon:"🎵",
    name:"抖音",
    color:"#161823",
    intro:"旅行短纪录片",
    url:"https://www.douyin.com/"
},

{
    id:"yt",
    icon:"▶",
    name:"YouTube",
    color:"#FF0000",
    intro:"海外旅行纪录片频道",
    url:"https://youtube.com/channel/UC64R-hCddzIo8BgVQYAjAxg?si=HKoR3leAoHyoIPzP"
},

{
    id:"x",
    icon:"𝕏",
    name:"X",
    color:"#111111",
    intro:"日常动态与观点分享",
    url:"https://x.com/"
}

];

const nav=document.getElementById("nav");
const content=document.getElementById("content");

DATA.forEach((p,i)=>{

    nav.innerHTML+=`
    <button
    class="${i===0?'active':''}"
    onclick="show('${p.id}',this)">
    ${p.icon} ${p.name}
    </button>`;

    content.innerHTML+=`

    <div
    id="${p.id}"
    class="panel ${i===0?'active':''}">

        <div
        class="hero"
        style="
        background:
        linear-gradient(
        135deg,
        ${p.color},
        #312e81
        )">

            <div>

                <div class="hero-title">
                    ${p.icon} ${p.name}
                </div>

                <div class="hero-sub">
                    ${p.intro}
                </div>

            </div>

        </div>

        <div class="card">

            <h2>
                ${p.name} 官方账号
            </h2>

            <p>
                欢迎访问我的 ${p.name} 官方主页。
            </p>

            <p>
                点击下方按钮，即可查看我的全部视频、
                动态、作品及最新内容。
            </p>

        </div>

        <a
        href="${p.url}"
        target="_blank"
        class="visit">

        进入 ${p.name} 官方主页 →

        </a>

    </div>

    `;
});

function show(id,btn){

    document
    .querySelectorAll('.panel')
    .forEach(
        x=>x.classList.remove('active')
    );

    document
    .querySelectorAll('.nav button')
    .forEach(
        x=>x.classList.remove('active')
    );

    document
    .getElementById(id)
    .classList.add('active');

    btn.classList.add('active');
}

</script>

</body>
</html>
