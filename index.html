<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Creator Hub OS26</title>
<style>
    :root {
        --bg-dark: #000000;
        --sidebar-bg: rgba(28, 28, 30, 0.85);
        --text-main: #ffffff;
        --text-secondary: #8e8e93;
        --accent: #0a84ff;
        --glass-border: rgba(255, 255, 255, 0.1);
        --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body { margin: 0; background: var(--bg-dark); color: var(--text-main); font-family: var(--font-stack); height: 100vh; display: flex; overflow: hidden; }

    /* ==================== 大屏模式 (macOS / iPad 横屏) ==================== */
    .sidebar {
        width: 280px; background: var(--sidebar-bg); backdrop-filter: blur(30px);
        border-right: 1px solid var(--glass-border); padding: 40px 20px;
        display: flex; flex-direction: column; gap: 12px; overflow-y: auto; flex-shrink: 0;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); z-index: 1000;
    }

    .profile-zone { text-align: center; margin-bottom: 20px; transition: opacity 0.2s; }
    .avatar { width: 80px; height: 80px; border-radius: 20px; background: #333; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; }
    
    .nav-item { padding: 14px 18px; border-radius: 12px; cursor: pointer; transition: 0.3s; color: var(--text-secondary); white-space: nowrap; overflow: hidden; }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
    .nav-item.active { background: var(--accent); color: white; font-weight: 600; }

    .main { flex: 1; overflow-y: auto; padding: 40px; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 16px; border: 1px solid var(--glass-border); cursor: pointer; transition: 0.2s; }
    .card:hover { background: rgba(255,255,255,0.1); }

    /* 遮罩层 - 用于点击空白处关闭 */
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 999; }

    /* ==================== 移动端 / 窄屏全适配 (iOS26 / iPad 竖屏) ==================== */
    @media (max-width: 768px) {
        /* 侧边栏常驻窄边框状态 */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100%;
            width: 50px; /* 默认常驻缩小的极窄边框宽度 */
            padding: 30px 5px;
            align-items: center;
        }

        /* 隐藏大头像，改为极小圆点或直接不显 */
        .profile-zone { opacity: 0; height: 0; margin-bottom: 0; overflow: hidden; }
        
        /* 窄版导航文字隐藏 */
        .nav-item span { display: none; }
        .nav-item { width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 50%; position: relative; }
        /* 使用纯色圆点或缩写临时代替图标 */
        .nav-item::before { content: "•"; font-size: 18px; color: var(--text-secondary); }
        .nav-item.active::before { color: #fff; }

        /* 当触摸激活完整菜单时 (展开至屏幕 1/4 处或固定 260px) */
        .sidebar.active {
            width: 70vw; /* 约等同于 iPhone 的 1/4 至 1/3 布局效果，或设为 260px */
            max-width: 280px;
            align-items: stretch;
            padding: 40px 20px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.6);
        }
        .sidebar.active .profile-zone { opacity: 1; height: auto; margin-bottom: 20px; }
        .sidebar.active .nav-item { width: 100%; height: auto; padding: 14px 18px; border-radius: 12px; justify-content: flex-start; }
        .sidebar.active .nav-item span { display: inline; }
        .sidebar.active .nav-item::before { display: none; }

        /* 【关键改动】主内容区向右移动，空出左边框，彻底防止误触 */
        .main {
            padding: 25px 20px 25px 70px; /* 左边距留出 70px 完美避开最左侧卡片误触 */
        }
        
        .grid { grid-template-columns: 1fr; }
        .sidebar.active ~ .overlay { display: block; }
    }
</style>
</head>
<body>

<div class="overlay" onclick="closeMenu()"></div>

<nav class="sidebar" id="sidebar" onclick="handleSidebarTouch(event)"></nav>

<main class="main">
    <h1 id="title" style="margin-bottom: 20px;">Creator Hub</h1>
    <div class="grid" id="grid"></div>
</main>

        ]},
        global: { name: '国际平台', items: [

        ]},

            {icon: "D", name: "Disney+", desc: "迪士尼流媒体", url: "https://disneyplus.com"},
            {icon: "P", name: "Prime Video", desc: "亚马逊流媒体", url: "https://primevideo.com"},
            {icon: "H", name: "HBO Max", desc: "华纳顶级剧集", url: "https://max.com"},
            {icon: "♪", name: "Spotify", desc: "播客与音乐库", url: "https://spotify.com"},
            {icon: "🎵", name: "Apple Music", desc: "高清音乐歌单", url: "https://music.apple.com"}
        ]},
        news: { name: '资讯', items: [
            {icon: "📰", name: "澎湃新闻", desc: "时事要闻", url: "https://www.thepaper.cn"},
            {icon: "📰", name: "纽约时报", desc: "国际时事", url: "https://nytimes.com"},

            {icon: "🦊", name: "Fox News", desc: "福克斯新闻", url: "https://www.foxnews.com"},
            {icon: "🗞️", name: "华盛顿邮报", desc: "华盛顿邮报", url: "https://www.washingtonpost.com"},
            {icon: "🇬🇧", name: "BBC News", desc: "BBC News 中文", url: "https://www.bbc.com/zhongwen/simp"},
            {icon: "⚡", name: "Yahoo", desc: "雅虎新闻", url: "https://news.yahoo.com"},
            {icon: "📰", name: "Google", desc: "Google 新闻", url: "https://news.google.com"},
            {icon: "📖", name: "纽约时报", desc: "纽约时报中文网", url: "https://cn.nytimes.com"},
            {icon: "🌏", name: "路透社", desc: "突发国际新闻", url: "https://cn.reuters.com"},
            {icon: "💼", name: "华尔街日报", desc: "华尔街日报中文网", url: "https://cn.wsj.com"},
            {icon: "💰", name: "FT中文网", desc: "全球财经新闻", url: "https://www.ftchinese.com"},
            {icon: "🇫🇷", name: "法广", desc: "法广时事与新闻", url: "https://www.rfi.fr/cn"},
            {icon: "🇩🇪", name: "德国之声", desc: "在线报导", url: "https://www.dw.com/zh"},
            {icon: "🇨🇳", name: "ChinaNews", desc: "海外中国新闻", url: "https://www.chinanews.com.cn"},
            {icon: "明", name: "明报", desc: "明报网站", url: "https://news.mingpao.com"},
            {icon: "联", name: "联合新闻网", desc: "联合新闻网", url: "https://udn.com"},
            {icon: "🇱🇹", name: "自由时报", desc: "自由时报电子报", url: "https://www.ltn.com.tw"},
            {icon: "🇸🇬", name: "联合早报", desc: "国际版首页", url: "https://www.zaobao.com.sg"}
        ]},
        graphic: { name: '图文', items: [
            {icon: "🛍️", name: "淘宝", desc: "在线购物", url: "https://taobao.com"},
            {icon: "🛍️", name: "京东", desc: "在线购物", url: "https://jd.com"}
        ]},
        other: { name: '其他', items: [
            {icon: "⚪", name: "待定", desc: "空数据测试", url: "#"}
        ]},
        business: { name: '商务', items: [
            {icon: "💼", name: "商务合作", desc: "联系邮箱/合作", url: "mailto:example@email.com"},
            {icon: "📊", name: "Media Kit", desc: "创作者数据看板", url: "#"}
        ]}
    };

    const sidebar = document.getElementById('sidebar');

    // 移动端核心控制逻辑
    function handleSidebarTouch(e) {
        if (window.innerWidth <= 768) {
            sidebar.classList.add('active');
            e.stopPropagation();
        }
    }

    function closeMenu() {
        if (window.innerWidth <= 768) {
            sidebar.classList.remove('active');
        }
    }

    function handleNavClick(key, e) {
        render(key);
        closeMenu();
        if(e) e.stopPropagation(); // 阻止冒泡
    }

    function render(key) {
        const data = DATA[key];
        document.getElementById('title').innerText = data.name;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.key === key));
        const grid = document.getElementById('grid');
        grid.innerHTML = data.items.map(item => `
            <div class="card" onclick="window.open('${item.url}', '_blank')">
                <div style="font-size: 24px; margin-bottom: 10px;">${item.icon}</div>
                <div style="font-weight: 600;">${item.name}</div>
                <div style="font-size: 13px; color: var(--text-secondary); margin-top: 4px;">${item.desc}</div>
            </div>
        `).join('');
    }

    // 初始化基础 DOM 结构
    sidebar.innerHTML = `
        <div class="profile-zone">
            <div class="avatar"></div>
            <div style="font-weight: 600;">颜途的视界</div>
        </div>
    `;
    
    Object.keys(DATA).forEach(key => {
        const item = document.createElement('div');
        item.className = 'nav-item';
        item.dataset.key = key;
        item.innerHTML = `<span>${DATA[key].name}</span>`;
        item.onclick = (e) => handleNavClick(key, e);
        sidebar.appendChild(item);
    });

    render('cn'); 
</script>
</body>
</html>
