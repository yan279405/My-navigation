<html lang="zh-CN">
<head>

  <title>Creator Hub OS26 - Apple Ecosystem Edition</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hub OS">
  
  <style>
    /* ==========================================================================
       1. 全局变量与基础重置 (Variables & Base Resets)
       ========================================================================== */
    :root {
      --text-main: #ffffff;
      --text-shadow: 0 1px 2px rgba(140, 117, 117, 0.566);
      --icon-radius: 24%;
      --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", sans-serif;
      --icon-size: 62px;
    }

    * { 
      box-sizing: border-box; 
    }
    
    html, body { 
      height: 100%; 
    }

    body {
      margin: 0;
      padding: 0;
      font-family: var(--font-stack);
      min-height: 100dvh;
      width: 100%;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      touch-action: manipulation;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      background: #0f3460;
    }

    /* 动态渐变背景层 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -2;
      background: radial-gradient(circle at 10% 10%, #1a1a2e 0%, #16213e 40%, #0f3460 80%, #e94560 120%);
    }

    /* 全局毛玻璃遮罩 */
    .blur-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10, 10, 20, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 1;
      pointer-events: none;
    }

    /* ==========================================================================
       2. 主体框架与应用网格 (Main Layout & App Grid)
       ========================================================================== */
    main {
      position: relative;
      z-index: 2;
      flex: 1;
      width: 100%;
      padding: calc(40px + env(safe-area-inset-top)) 24px 20px;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    main::-webkit-scrollbar { 
      width: 4px; 
    }
    
    main::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 10px;
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
      gap: 32px 16px;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ==========================================================================
       3. 应用组件样式 (App Icon Components)
       ========================================================================== */
    .app-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      outline: none;
      transition: transform 0.2s cubic-bezier(0.33, 1, 0.68, 1);
      -webkit-tap-highlight-color: transparent;
      will-change: transform;
    }

    .app-icon:active { 
      transform: scale(0.9); 
    }

    .icon-wrapper {
      width: var(--icon-size);
      height: var(--icon-size);
      border-radius: var(--icon-radius);
      box-shadow: 0 5px 14px rgba(0, 0, 0, 0.12), inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 7px;
      position: relative;
      overflow: hidden;
      transition: transform 0.25s ease, opacity 0.25s ease, background-color 0.25s ease, box-shadow 0.25s ease, color 0.25s ease;
      contain: paint;
    }

    .icon-wrapper svg {
      width: calc(var(--icon-size) * 0.48);
      height: calc(var(--icon-size) * 0.48);
      fill: currentColor;
      display: block;
    }

    .app-name {
      color: var(--text-main);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.4px;
      text-align: center;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: var(--text-shadow);
      opacity: 0.92;
    }

    /* ==========================================================================
       4. 底部系统常驻栏 (Footer & Dock Container)
       ========================================================================== */
    footer {
      width: 100%;
      position: fixed;
      bottom: 0;
      left: 0;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      padding-top: 10px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: transparent;
    }

    .user-signature {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.6px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      user-select: text;
      -webkit-user-select: text;
    }

    .signature-split { 
      opacity: 0.25; 
      margin: 0 4px; 
    }

    .dock-container {
      background: rgba(255, 255, 255, 0.11);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(25px) saturate(210%);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
      height: 64px;
      padding: 0 16px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      box-sizing: border-box;
      transition: transform 0.25s ease, opacity 0.25s ease, background-color 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      contain: layout paint style;
    }

    .dock-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      position: relative;
      box-sizing: border-box;
      touch-action: none;
      -webkit-touch-callout: none;
      will-change: transform;
    }

    .dock-icon-wrapper {
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 0.25s ease, opacity 0.25s ease, background-color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      box-sizing: border-box;
      padding: 4px;
    }

    .dock-emoji {
      font-size: 18px;
      line-height: 1;
      transition: transform 0.25s ease;
    }

    .dock-name {
      color: #ffffff;
      font-size: 9px;
      font-weight: 500;
      margin-top: 3px;
      opacity: 0.75;
      white-space: nowrap;
      text-shadow: var(--text-shadow);
      transition: color 0.25s ease, opacity 0.25s ease, font-weight 0.25s ease;
    }

    /* ==========================================================================
       5. 交互状态控制 (Interaction & Active States)
       ========================================================================== */
    .dock-item.active .dock-icon-wrapper {
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 4px 15px rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 1);
    }

    .dock-item.active .dock-emoji { 
      transform: scale(1.12); 
    }

    .dock-item.active .dock-name {
      color: #121212;
      font-weight: 600;
      opacity: 1;
    }

    .dock-item:active .dock-icon-wrapper { 
      transform: scale(0.88); 
    }

    /* ==========================================================================
       6. 响应式自适应布局 (Media Queries)
       ========================================================================== */
    /* 平板竖屏 */
    @media (min-width: 600px) and (max-width: 1024px) and (orientation: portrait) {
      :root { --icon-size: 64px; }
      .app-grid {
        grid-template-columns: repeat(6, 1fr);
        max-width: 680px;
        gap: 36px 18px;
      }
      .dock-container { height: 70px; padding: 0 20px; gap: 20px; }
      .dock-icon-wrapper { width: 56px; height: 56px; border-radius: 14px; }
      .dock-emoji { font-size: 22px; }
      .dock-name { font-size: 10px; }
    }

    /* 平板/准电脑端横屏 */
    @media (min-width: 600px) and (max-width: 1366px) and (orientation: landscape) {
      :root { --icon-size: 62px; }
      main { padding: calc(30px + env(safe-area-inset-top)) 30px 10px; }
      .app-grid {
        grid-template-columns: repeat(8, 1fr);
        max-width: 860px;
        gap: 24px 18px;
      }
      .dock-container { height: 70px; padding: 0 20px; gap: 20px; }
      .dock-icon-wrapper { width: 56px; height: 56px; border-radius: 14px; }
      .dock-emoji { font-size: 22px; }
      .dock-name { font-size: 10px; }
    }

    /* 大型桌面显示器 */
    @media (min-width: 1367px) {
      :root { --icon-size: 68px; }
      main { padding: 45px 40px 15px; }
      .app-grid {
        grid-template-columns: repeat(10, 1fr);
        max-width: 1120px;
        gap: 36px 22px;
      }
      .dock-container { height: 74px; padding: 0 24px; gap: 22px; }
      .dock-icon-wrapper { width: 60px; height: 60px; border-radius: 15px; }
      .dock-emoji { font-size: 24px; }
      .dock-name { font-size: 10px; }
    }

    /* 手机横屏及矮屏幕设备防溢出优化 */
    @media (orientation: landscape) and (max-height: 500px) {
      :root { --icon-size: 40px; }
      main { padding: calc(6px + env(safe-area-inset-top)) 20px 4px; }
      .app-grid {
        grid-template-columns: repeat(8, 1fr);
        gap: 10px 14px;
        max-width: 680px;
      }
      .icon-wrapper { margin-bottom: 3px; }
      .app-name { font-size: 10px; }
      footer {
        padding-bottom: calc(5px + env(safe-area-inset-bottom));
        gap: 4px;
      }
      .user-signature { flex-direction: row; gap: 20px; font-size: 10px; }
      .dock-container {
        height: 38px;
        gap: 10px;
        padding: 0 10px;
        border-radius: 12px;
      }
      .dock-item { flex-direction: row; }
      .dock-icon-wrapper {
        flex-direction: row;
        width: auto;
        height: 30px;
        padding: 0 10px;
        gap: 5px;
        border-radius: 8px;
      }
      .dock-emoji { font-size: 14px; }
      .dock-name { margin-top: 0; font-size: 10px; opacity: 0.9; }
    }

    @media (max-height: 400px) and (orientation: landscape) {
      :root { --icon-size: 36px; }
      .app-grid { gap: 6px 14px; }
    }
  </style>
</head>

    function renderApps(key) {
      const section = DATA[key];
      if (!section || !section.items) return;

      // 清空旧节点
      grid.replaceChildren();

      // 切换底部常驻 Dock 项的激活样式
      document.querySelectorAll('.dock-item').forEach(item => {
        item.classList.toggle('active', item.dataset.key === key);
      });

      const fragment = document.createDocumentFragment();

      // 构建并填充图标项
      for (const app of section.items) {
        const item = document.createElement('div');
        item.className = 'app-icon';
        item.tabIndex = 0;
        item.title = app.desc;
        item.innerHTML = `
          <div class="icon-wrapper" style="background:${app.bg};color:${app.color};">
            ${app.svg}
          </div>
          <div class="app-name">${app.name}</div>
        `;
        
        // 绑定事件
        const openUrl = () => window.open(app.url, '_blank', 'noopener,noreferrer');
        item.addEventListener('click', openUrl);
        item.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            openUrl();
          }
        });
        fragment.appendChild(item);
      }

      grid.appendChild(fragment);
    }

    // 动态初始化创建底部 Dock 栏分类选择器
    const dockFragment = document.createDocumentFragment();
    for (const key of Object.keys(DATA)) {
      const item = document.createElement('div');
      item.className = 'dock-item';
      item.dataset.key = key;
      item.title = DATA[key].name;
      item.innerHTML = `
        <div class="dock-icon-wrapper">
          <span class="dock-emoji">${DATA[key].short}</span>
          <span class="dock-name">${DATA[key].name}</span>
        </div>
      `;
      item.addEventListener('click', () => renderApps(key));
      dockFragment.appendChild(item);
    }
    dock.appendChild(dockFragment);

    // 启动初始化页面默认渲染国际平台
    renderApps('global');

    // PWA 服务离线运行注册
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }

    // 禁用移动端自带的多指缩放原生行为，保持原生 OS 级别体验
    document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });
  </script>
</body>
</html>
