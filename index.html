<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>iPhone Home Screen - Glassmorphism Premium Edition</title>
<style>
    /* ==================== 1. 全局自适应核心变量 ==================== */
    :root {
        --bg-system: #000000;
        --glass-bg: rgba(255, 255, 255, 0.08);
        --glass-border: rgba(255, 255, 255, 0.12);
        --text-main: #ffffff;
        --text-secondary: #8e8e93;
        --accent: #0a84ff;
        --app-radius: 22%; /* 严格的 iOS 黄金图标圆角 */
        --dock-item-bg: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
        
        /* 新增：图标全局微光和投影 */
        --app-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        --app-border: rgba(255, 255, 255, 0.15);
    }

    @media (prefers-color-scheme: light) {
        :root {
            --bg-system: #f2f2f7; 
            --glass-bg: rgba(0, 0, 0, 0.05); 
            --glass-border: rgba(0, 0, 0, 0.08);
            --text-main: #000000;
            --text-secondary: #6c6c70;
            --accent: #007aff;
            --dock-item-bg: linear-gradient(135deg, rgba(0,0,0,0.06), rgba(0,0,0,0.02));
            --app-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
            --app-border: rgba(0, 0, 0, 0.06);
        }
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
        margin: 0;
        background: transparent; 
        background-color: var(--bg-system);
        color: var(--text-main);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        width: 100vw;
        user-select: none;
        align-items: center;
        justify-content: space-between;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        transition: background-color 0.3s ease, color 0.3s ease;
    }

    .main {
        width: 100%;
        max-width: 480px;
        flex: 1;
        overflow-y: auto;
        padding: 40px 24px 10px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        scrollbar-width: none; 
    }
    .main::-webkit-scrollbar { display: none; }
    
    .content-wrapper { width: 100%; }

    h1#title { 
        margin: 0 0 32px 0; 
        font-size: 26px; 
        font-weight: 700; 
        letter-spacing: -0.5px;
        text-align: center;
        transition: color 0.3s ease;
    }

    .grid { 
        display: grid; 
        grid-template-columns: repeat(4, 1fr); 
        gap: 28px 16px; 
        width: 100%;
        justify-items: center;
    }
    
    .app-box {
        display: flex;
        flex-direction: column;
        align-items: center;
        cursor: pointer;
        width: 100%;
        max-width: 72px;
    }
    
    /* ==================== 2. 精雕细琢的图标晶莹质感 ==================== */
    .app-icon {
        width: 60px;
        height: 60px;
        border-radius: var(--app-radius);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s, filter 0.2s, box-shadow 0.2s;
        box-shadow: var(--app-shadow);
        overflow: hidden;
        position: relative;
        /* 使用微弱的一像素内边框，模拟真实玻璃边缘高光 */
        border: 1px solid var(--app-border);
    }

    /* 图标内嵌微弱的渐变上高光层 */
    .app-icon::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; height: 50%;
        background: linear-gradient(to bottom, rgba(255,255,255,0.12), rgba(255,255,255,0));
        pointer-events: none;
    }

    /* 按压反馈 */
    .app-box:active .app-icon { 
        transform: scale(0.88) translateY(2px); 
        filter: brightness(0.85); 
        box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    /* SVG 标志样式精修 */
    .app-icon svg {
        width: 58%;
        height: 58%;
        object-fit: contain;
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
    }

    /* 文本类图标艺术化艺术字样式 */
    .app-icon .text-logo {
        font-family: "PingFang SC", "SF Pro", sans-serif;
        font-weight: 800;
        color: #ffffff;
        text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    
    .app-name {
        margin-top: 8px;
        font-size: 11px;
        font-weight: 500;
        color: var(--text-main); 
        text-align: center;
        width: 100%;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        transition: color 0.3s ease;
        opacity: 0.9;
    }

    /* ==================== 3. 智能融合毛玻璃 Dock 栏 ==================== */
    .dock-container {
        width: 100%;
        max-width: 480px;
        padding: 0 16px 16px 16px;
        display: flex;
        justify-content: center;
        box-sizing: border-box;
    }

    .dock {
        width: 100%;
        background: var(--glass-bg);
        backdrop-filter: blur(30px) saturate(180%);
        -webkit-backdrop-filter: blur(30px) saturate(180%);
        border: 1px solid var(--glass-border);
        border-radius: 32px;
        padding: 12px 10px;
        display: flex;
        justify-content: space-around;
        align-items: center;
        box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        transition: background 0.3s, border 0.3s;
    }

    .nav-item {
        width: 54px;
        height: 54px;
        border-radius: var(--app-radius);
        background: var(--dock-item-bg);
        border: 1px solid var(--glass-border);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s, background 0.3s;
        position: relative;
    }
    .nav-item:active { transform: scale(0.85); }
    
    .nav-item span {
        font-size: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .nav-item.active {
        box-shadow: 0 0 12px rgba(10, 132, 255, 0.2);
        border-color: var(--accent);
    }
    .nav-item.active::after {
        content: ''; position: absolute; bottom: -6px; width: 4px; height: 4px; border-radius: 50%; background: var(--text-main);
        transition: background 0.3s;
    }

    @media (max-width: 390px) {
        .grid { gap: 20px 12px; }
        .app-icon { width: 54px; height: 54px; }
        .nav-item { width: 48px; height: 48px; }
        h1#title { font-size: 22px; margin-bottom: 24px; }
    }
</style>
</head>

</main>

<div class="dock-container">
    <nav class="dock" id="dock"></nav>
</div>

    const dock = document.getElementById('dock');

    function render(key) {
        const data = DATA[key];
        document.getElementById('title').innerText = data.name;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.key === key));
        const grid = document.getElementById('grid');
        
        grid.innerHTML = data.items.map(item => `
            <div class="app-box" onclick="window.open('${item.url}', '_blank')">
                <div class="app-icon" style="background: ${item.bg || '#222'};">
                    ${item.icon}
                </div>
                <div class="app-name">${item.name}</div>
            </div>
        `).join('');
    }

    // 渲染 Dock 按钮
    Object.keys(DATA).forEach(key => {
        const item = document.createElement('div');
        item.className = 'nav-item';
        item.dataset.key = key;
        item.innerHTML = `<span>${DATA[key].short}</span>`;
        item.onclick = () => render(key);
        dock.appendChild(item);
    });

    render('cn'); 
</script>
