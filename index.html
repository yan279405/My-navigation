<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator Hub OS26</title>

<style>
/* --- 1. 设计系统变量 (Design Tokens) --- */
:root {
    /* 色彩系统 */
    --bg-dark: #020617;
    --text-primary: #ffffff;
    --text-secondary: #94a3b8;
    --text-muted: #cbd5e1;
    --glass-bg: rgba(255, 255, 255, 0.06);
    --glass-border: rgba(255, 255, 255, 0.12);
    --accent-gradient: linear-gradient(135deg, #38bdf8, #6366f1);
    
    /* 字号层级 (Typography Scale) */
    --fs-hero: 42px;
    --fs-title-lg: 28px;
    --fs-title-md: 20px;
    --fs-body: 15px;
    --fs-small: 13px;
    
    /* 字重层级 (Font Weights) */
    --fw-bold: 700;
    --fw-medium: 500;
    --fw-regular: 400;
    
    /* 圆角与阴影 */
    --radius-xl: 28px;
    --radius-lg: 20px;
    --radius-md: 14px;
    --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.1);
    --shadow-md: 0 12px 32px rgba(0, 0, 0, 0.2);
    --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.4);
    --inner-glow: inset 0 1px 1px rgba(255, 255, 255, 0.15);
}

/* --- 2. 基础复位 --- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", sans-serif;
}

body {
    background:
        radial-gradient(circle at 15% 15%, #1e3a8a, transparent 45%),
        radial-gradient(circle at 85% 25%, #7c3aed, transparent 45%),
        radial-gradient(circle at 50% 85%, #0ea5e9, transparent 45%),
        linear-gradient(135deg, var(--bg-dark), #0f172a, #1e293b);
    background-size: 200% 200%;
    animation: moveBg 14s ease infinite;
    color: var(--text-primary);
}

@keyframes moveBg {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* --- 3. 鼠标跟随光效 (底网层) --- */
#light {
    position: fixed;
    top: 0;
    left: 0;
    width: 350px;
    height: 350px;
    border-radius: 50%;
    pointer-events: none;
    background: radial-gradient(circle, rgba(99, 102, 241, 0.2), transparent 65%);
    transform: translate(-100%, -100%);
    filter: blur(30px);
    z-index: 1;
    will-change: transform;
}

/* --- 4. 启动画面 (顶层层级) --- */
.splash {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: var(--bg-dark);
    animation: splashHide 2.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
}

.logo {
    font-size: 80px;
    animation: breathe 2s ease-in-out infinite;
}

.name {
    margin-top: 24px;
    font-size: var(--fs-title-lg);
    font-weight: var(--fw-bold);
    letter-spacing: -0.5px;
}

.sub {
    margin-top: 8px;
    font-size: var(--fs-body);
    color: var(--text-secondary);
}

@keyframes breathe {
    50% { transform: scale(1.06); }
}

@keyframes splashHide {
    85% { opacity: 1; }
    100% { 
        opacity: 0; 
        visibility: hidden; 
    }
}

/* --- 5. 主应用布局 (中景层) --- */
.app {
    position: relative;
    z-index: 2;
    display: flex;
    width: 100vw;
    height: 100vh;
}

/* 左侧侧边栏 - 强调内聚与纵向引导 */
.sidebar {
    width: 300px;
    height: 100vh;
    padding: 40px 24px;
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    background: rgba(15, 23, 42, 0.6);
    border-right: 1px solid var(--glass-border);
    box-shadow: var(--shadow-md);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
}

.profile-zone {
    text-align: center;
    margin-bottom: 40px;
}

.avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    margin: 0 auto 20px;
    background: var(--accent-gradient);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 36px;
    font-weight: var(--fw-bold);
    box-shadow: var(--shadow-sm), var(--inner-glow);
}

.username {
    font-size: var(--fs-title-md);
    font-weight: var(--fw-bold);
    letter-spacing: -0.3px;
    margin-bottom: 8px;
}

.bio {
    font-size: var(--fs-small);
    color: var(--text-secondary);
    line-height: 1.6;
    padding: 0 10px;
}

/* 导航菜单 */
.menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.menu button {
    height: 52px;
    padding: 0 20px;
    border: 1px solid transparent;
    border-radius: var(--radius-md);
    background: rgba(255, 255, 255, 0.03);
    color: var(--text-muted);
    font-size: var(--fs-body);
    font-weight: var(--fw-medium);
    text-align: left; /* 靠左对齐更符合规范排版 */
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
    box-shadow: var(--inner-glow);
}

.menu button:hover {
    transform: translateX(4px);
    background: rgba(255, 255, 255, 0.08);
    color: var(--text-primary);
    border-color: rgba(255, 255, 255, 0.05);
}

.menu button:active {
    transform: scale(0.98) translateX(2px);
}

.menu button.active {
    background: var(--accent-gradient);
    color: var(--text-primary);
    border-color: transparent;
    box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3), var(--inner-glow);
}

/* 右侧主内容区 - 强调空间延展与卡片浮动 */
.main {
    flex: 1;
    padding: 40px;
    overflow-y: auto;
}

/* 欢迎横幅 - 增强字号大对比 */
.hero {
    min-height: 180px;
    border-radius: var(--radius-xl);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    box-shadow: var(--shadow-md), var(--inner-glow);
    margin-bottom: 32px;
}

.hero h1 {
    font-size: var(--fs-hero);
    font-weight: var(--fw-bold);
    letter-spacing: -1px;
    line-height: 1.2;
}

.hero p {
    margin-top: 12px;
    font-size: var(--fs-body);
    color: var(--text-muted);
    font-weight: var(--fw-medium);
    opacity: 0.9;
}

/* 卡片栅格系统 */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
}

/* 独立卡片 - 强化物理浮动层级 */
.card {
    position: relative;
    height: 150px;
    border-radius: var(--radius-lg);
    padding: 28px;
    cursor: pointer;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: var(--shadow-sm), var(--inner-glow);
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.card::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.15), transparent);
    transition: 0.7s;
}

.card:hover::before {
    left: 100%;
}

.card:hover {
    transform: translateY(-8px) scale(1.02);
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.18);
    box-shadow: var(--shadow-lg), var(--inner-glow);
}

.card:active {
    transform: scale(0.97) translateY(-3px);
}

.card-title {
    font-size: var(--fs-title-md);
    font-weight: var(--fw-bold);
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.card-sub {
    margin-top: 12px;
    font-size: var(--fs-small);
    color: var(--text-secondary);
    line-height: 1.5;
}

/* --- 6. 移动端响应式层级重构 (Responsive) --- */
@media(max-width: 900px) {
    html, body {
        overflow: auto; /* 恢复全局滚动以适配手机 */
    }
    .app {
        flex-direction: column;
        height: auto;
        width: 100%;
    }
    .sidebar {
        width: 100%;
        height: auto;
        padding: 30px 20px;
        border-right: none;
        border-bottom: 1px solid var(--glass-border);
    }
    .profile-zone {
        margin-bottom: 24px;
    }
    .avatar {
        width: 80px;
        height: 80px;
        font-size: 28px;
        margin-bottom: 12px;
    }
    .username {
        font-size: var(--fs-title-md);
    }
    .menu {
        display: grid;
        grid-template-columns: repeat(2, 1fr); /* 移动端菜单改为双列网格，节省高度 */
        gap: 8px;
    }
    .menu button {
        height: 46px;
        font-size: var(--fs-small);
        padding: 0 12px;
        justify-content: center; /* 手机端居中紧凑对齐 */
    }
    .main {
        padding: 24px 16px;
    }
    .hero {
        padding: 30px 20px;
        min-height: auto;
        margin-bottom: 24px;
    }
    .hero h1 {
        font-size: var(--fs-title-lg);
    }
    .cards {
        gap: 16px;
    }
}
</style>
</head>

<body>

<div class="splash" id="splashScreen">
    <div class="logo"></div>
    <div class="name">Creator Hub</div>
    <div class="sub">Apple OS26 Experience</div>
</div>

<div class="app">
    <div class="sidebar">
        <div class="profile-zone">
            <div class="avatar"> </div>
            <div class="username">颜途的视界</div>
            <div class="bio">Travel · Human<br>Documentary Creator</div>
        </div>

        <div class="menu">

    <button data-type="cn" onclick="showPage('cn')">📺 国内平台</button>
    <button data-type="global" onclick="showPage('global')">▶ 国际平台</button>
    <button data-type="media" onclick="showPage('media')">♪ 流媒体</button>
    <button data-type="news" onclick="showPage('news')">📰 资讯</button>
    <button data-type="shopping" onclick="showPage('shopping')">🛍️ 购物</button>
    <button data-type="business" onclick="showPage('business')">💼 商务</button>

</div>
    </div>

    <div class="main">
        <div class="hero">
            <h1>🍎 Creator Hub </h1>
            <p></p>
        </div>
        <div id="page"></div>
    </div>
</div>

<div id="light"></div>
    
    <script>
        
let currentPage = "cn";

/* ===== 菜单状态同步（App级核心） ===== */
function setActiveMenu(type){

    document.querySelectorAll(".menu button")
        .forEach(btn=>{

            const t = btn.dataset.type;

            if(t === type){
                btn.classList.add("active");
            }else{
                btn.classList.remove("active");
            }
        });
}

/* ===== 页面渲染（带动画） ===== */
function render(type){

    const page = document.getElementById("page");

    page.style.opacity = 0;
    page.style.transform = "translateY(12px)";

    setTimeout(()=>{

        page.innerHTML = `<div class="cards"></div>`;
        const box = page.querySelector(".cards");

        DATA[type].forEach(item=>{

            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <div class="card-title">${item.icon} ${item.name}</div>
                <div class="card-sub">${item.desc}</div>
            `;

            div.onclick = ()=> window.open(item.url, "_blank");

            box.appendChild(div);
        });

        page.style.opacity = 1;
        page.style.transform = "translateY(0)";

    },120);
}

/* ===== App主入口 ===== */
function showPage(type){

    currentPage = type;

    setActiveMenu(type);
    render(type);

    // 状态显示（App识别当前平台）
    document.querySelector(".hero p").innerText =
        "当前平台：" + type.toUpperCase();

    // 记忆系统（App级体验）
    localStorage.setItem("lastPage", type);
}

/* ===== 初始化 App ===== */
function initApp(){

    const last = localStorage.getItem("lastPage");

    showPage(last || "cn");
}

initApp();

/* ===== 光效 ===== */
const light = document.getElementById("light");

document.addEventListener("mousemove", e=>{
    light.style.transform =
        `translate(${e.clientX - 175}px, ${e.clientY - 175}px)`;
});

/* ===== splash修复（避免报错） ===== */
setTimeout(()=>{

    const splash = document.querySelector(".splash");

    if(splash){
        splash.remove();
    }

},2500);
