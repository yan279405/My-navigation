  <link rel="apple-touch-icon" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hub OS">
  
  <style>
    /* ==========================================================================\
       1. 全局响应式变量系统（针对手机、平板、桌面端优化布局与毛玻璃）
       ========================================================================== */
    :root {
      --text-main: #ffffff;
      --text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6);
      --icon-radius: 22%;
      --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", sans-serif;
      
      /* 🖥️ 默认桌面大屏配置 */
      --grid-cols: 10;
      --grid-rows: 4;
      --gap-size: 28px;
      --padding-size: 35px;
      --icon-size: 72px;
      --blur-amount: 25px;
    }

    @media (max-width: 1024px) {
      /* 📐 平板端专项微调 */
      :root {
        --grid-cols: 6;
        --grid-rows: 5;
        --gap-size: 22px;
        --padding-size: 25px;
        --icon-size: 66px;
        --blur-amount: 20px;
      }
    }

    @media (max-width: 768px) {
      /* 📱 手机端像素级复刻 iOS 4×6 桌面 */
      :root {
        --grid-cols: 4;
        --grid-rows: 6;
        --gap-size: 16px;
        --padding-size: 20px;
        --icon-size: 60px;
        --blur-amount: 15px;
      }
    }

    * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: var(--font-stack); }

    /* 顶级视觉：支持平滑切换的多套高阶渐变背景 */
    body {
      background: linear-gradient(135deg, #1e1e2f 0%, #2a1b40 30%, #4a2040 60%, #1a2a6c 100%);
      background-size: 400% 400%;
      transition: background 0.8s cubic-bezier(0.25, 1, 0.5, 1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    /* ==========================================================================\
       2. 顶端多功能智能卡片控制栏
       ========================================================================== */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 25px var(--padding-size) 10px var(--padding-size);
      z-index: 30;
      gap: 15px;
    }

    .brand-title {
      color: var(--text-main);
      font-size: 16px;
      font-weight: 600;
      text-shadow: var(--text-shadow);
      letter-spacing: 0.5px;
    }

    .control-actions { display: flex; gap: 10px; align-items: center; }
    
    .glass-btn {
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(var(--blur-amount));
      -webkit-backdrop-filter: blur(var(--blur-amount));
      color: #fff;
      padding: 9px 14px;
      border-radius: 11px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-btn:active { transform: scale(0.92); }
    
    .done-btn {
      background: #007aff;
      border-color: #007aff;
      font-weight: 600;
      display: none; /* 仅在编辑模式下激活动态流出 */
      box-shadow: 0 4px 12px rgba(0,122,255,0.3);
    }
    body.editing-mode .done-btn { display: inline-block; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

    /* ==========================================================================\
       3. iOS 经典 Spotlight 隐藏全应用搜索舱
       ========================================================================== */
    .spotlight-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(30px) saturate(140%);
      -webkit-backdrop-filter: blur(30px) saturate(140%);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 40px;
    }
    .spotlight-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .spotlight-content {
      width: 90%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 25px;
      transform: translateY(-30px);
      transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .spotlight-overlay.active .spotlight-content {
      transform: translateY(0);
    }
    .spotlight-search-box {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
    }
    .spotlight-search-box .search-icon {
      position: absolute;
      left: 16px;
      font-size: 16px;
      opacity: 0.6;
    }
    .spotlight-search-box input {
      flex: 1;
      padding: 13px 16px 13px 46px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      font-size: 16px;
      outline: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      -webkit-user-select: text;
      user-select: text;
    }
    .spotlight-search-box input:focus {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.4);
    }
    .spotlight-results {
      width: 100%;
      max-height: 65vh;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .spotlight-results::-webkit-scrollbar { display: none; }
    
    .search-results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
      gap: 24px;
      width: 100%;
      padding: 10px;
    }
    .search-tip {
      text-align: center;
      color: rgba(255, 255, 255, 0.45);
      font-size: 14px;
      margin-top: 40px;
      letter-spacing: 0.5px;
    }

    /* ==========================================================================\
       4. 横向滑屏主舞台 (Scroll Snap 物理页面吸附)
       ========================================================================== */
    .stage {
      flex: 1;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .scroll-container {
      display: flex;
      width: 100%;
      height: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      scrollbar-width: none;
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    /* 单页视图 */
    .page-view {
      flex: 0 0 100%;
      width: 100%;
      height: 100%;
      scroll-snap-align: start;
      display: grid;
      grid-template-columns: repeat(var(--grid-cols), minmax(0, 1fr));
      grid-template-rows: repeat(var(--grid-rows), minmax(0, 1fr));
      gap: var(--gap-size);
      padding: var(--padding-size) var(--padding-size) calc(var(--padding-size) + 30px) var(--padding-size);
    }

    /* ==========================================================================\
       5. 应用组件体系与精细化 iOS 经典抖动动效
       ========================================================================== */
    .app-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      cursor: pointer;
      position: relative;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .app-item:not(.dragging):active { transform: scale(0.88); }

    .icon-wrapper {
      width: var(--icon-size);
      height: var(--icon-size);
      border-radius: var(--icon-radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: calc(var(--icon-size) * 0.46);
      background: rgba(255, 255, 255, 0.11);
      backdrop-filter: blur(var(--blur-amount));
      -webkit-backdrop-filter: blur(var(--blur-amount));
      box-shadow: 0 8px 24px rgba(0,0,0,0.18), inset 0 1px 1px rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .app-name {
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-main);
      text-shadow: var(--text-shadow);
      text-align: center;
      width: 90%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }

    /* 🍏 iOS 经典乱序抖动效果 */
    @keyframes iosJiggle {
      0% { transform: rotate(-1.2deg) scale(0.99); }
      50% { transform: rotate(1.2deg) scale(1.01); }
      100% { transform: rotate(-1.2deg) scale(0.99); }
    }
    body.editing-mode .stage .app-item {
      animation: iosJiggle 0.24s ease-in-out infinite;
    }
    body.editing-mode .stage .app-item:nth-child(even) {
      animation-duration: 0.28s;
      animation-delay: 0.04s;
    }

    /* 拖拽态样式抓取反馈 */
    .app-item.dragging {
      opacity: 0.25;
      transform: scale(1.15);
      animation: none !important;
    }

    /* ==========================================================================\
       6. 流线指示器与高饱和度毛玻璃 Dock 栏
       ========================================================================== */
    .pagination-container {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
      padding: 5px 12px;
      border-radius: 20px;
      background: rgba(0, 0, 0, 0.12);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.35);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .dot.active {
      background: var(--text-main);
      width: 18px;
      border-radius: 4px;
    }

    .dock-container {
      width: 100%;
      padding: 0 20px calc(12px + env(safe-area-inset-bottom)) 20px;
      display: flex;
      justify-content: center;
      z-index: 20;
    }
    .dock {
      background: rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(35px) saturate(190%);
      -webkit-backdrop-filter: blur(35px) saturate(190%);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 30px;
      padding: 10px 16px;
      display: flex;
      gap: 12px;
      box-shadow: 0 20px 45px rgba(0,0,0,0.32);
      max-width: 95%;
      overflow-x: auto;
    }
    .dock::-webkit-scrollbar { display: none; }
    .dock-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      padding: 6px 12px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .dock-icon-wrapper { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .dock-emoji { font-size: 24px; transition: transform 0.2s; }
    .dock-item:hover .dock-emoji { transform: scale(1.15) translateY(-2px); }
    .dock-name { font-size: 11px; color: var(--text-main); font-weight: 500; opacity: 0.85; }
  </style>
</head>

            { name: "苹果中国官网", desc: "Apple 硬件在中国大陆的官方选购与支持平台", url: "https://www.apple.com/cn/" },
            { name: "iCloud 官网", desc: "苹果生态下设备间云端数据无缝同步云服务", url: "https://www.icloud.com/" },
            { name: "MacBook Pro (香港)", desc: "Apple 香港地区 MacBook Pro 专属产品详情选购页", url: "https://www.apple.com/hk/macbook-pro/" },
            { name: "互传官网", desc: "vivo 官方推出的手机与电脑间零流量、快捷数据传输工具", url: "https://es.vivo.com/" },
            { name: "麦软订单详情页", desc: "正版软件商城（如会声会影、Camtasia 等）购买凭证及授权后台", url: "https://i.mairuan.com/orders/" },
            { name: "Nano 11 精简系统介绍", desc: "零度博客：专为低配置电脑打造的极致精简版 Windows 11", url: "https://www.freedidi.com/22070.html" },
            { name: "Famelack 免费直播电视", desc: "在全球范围内无需注册直接在线观看世界各国电视新闻频道", url: "https://famelack.com/all-channels" },
            { name: "LinkedIn 职业社交", desc: "全球最大的领英职场人脉与商业社交平台", url: "https://linkedin.com" }
        ]
    }
};

    const WALLPAPERS = [
      'linear-gradient(135deg, #1e1e2f 0%, #2a1b40 30%, #4a2040 60%, #1a2a6c 100%)',
      'linear-gradient(135deg, #0d1b2a 0%, #1b263b 40%, #415a77 100%)',
      'linear-gradient(135deg, #141115 0%, #2f1b25 50%, #4f3130 100%)',
      'linear-gradient(135deg, #16161a 0%, #24252d 100%)'
    ];

    const container = document.getElementById('scrollContainer');
    const dotsContainer = document.getElementById('paginationContainer');
    const dock = document.getElementById('dock');
    const wallpaperBtn = document.getElementById('wallpaperBtn');
    const exitEditBtn = document.getElementById('exitEditBtn');
    
    // 唤隐搜索核心组件
    const openSearchBtn = document.getElementById('openSearchBtn');
    const closeSearchBtn = document.getElementById('closeSearchBtn');
    const spotlightOverlay = document.getElementById('spotlightOverlay');
    const spotlightInput = document.getElementById('spotlightInput');
    const spotlightResults = document.getElementById('spotlightResults');

    let currentCategory = 'global';
    let currentWallpaperIdx = 0;
    let isEditMode = false;
    let pressTimer = null;
    let draggedIdx = null;
    let touchStartY = 0;

    function getGridCapacity() {
      const width = window.innerWidth;
      if (width > 1024) return 10 * 4;
      if (width > 768) return 6 * 5;
      return 4 * 6;
    }

    // ==========================================================================\
    // 8. 桌面应用渲染核心 (基于分类流式分箱)
    // ==========================================================================
    function renderApps(categoryKey) {
      currentCategory = categoryKey;
      container.innerHTML = '';
      dotsContainer.innerHTML = '';
      
      const category = DATA[categoryKey];
      let apps = [...category.apps];
      
      const pageSize = getGridCapacity();
      const pagesCount = Math.max(1, Math.ceil(apps.length / pageSize));
      
      for (let p = 0; p < pagesCount; p++) {
        const pageView = document.createElement('div');
        pageView.className = 'page-view';
        
        const pageApps = apps.slice(p * pageSize, (p + 1) * pageSize);
        const fragment = document.createDocumentFragment();
        
        pageApps.forEach((app) => {
          const globalIdx = category.apps.findIndex(a => a.name === app.name);
          
          const item = document.createElement('div');
          item.className = 'app-item';
          item.tabIndex = 0;
          
          if (isEditMode) {
            item.setAttribute('draggable', 'true');
          }
          
          item.innerHTML = `
            <div class="icon-wrapper"><span>${app.emoji}</span></div>
            <div class="app-name">${app.name}</div>
          `;
          
          bindLongPressEvents(item);
          
          // 挂载 Drag & Drop 核心排序
          item.addEventListener('dragstart', (e) => {
            if (!isEditMode) return e.preventDefault();
            draggedIdx = globalIdx;
            item.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
          });
          item.addEventListener('dragover', (e) => e.preventDefault());
          item.addEventListener('drop', (e) => {
            e.preventDefault();
            if (draggedIdx === null || draggedIdx === globalIdx) return;
            const targetApps = DATA[currentCategory].apps;
            const movingItem = targetApps.splice(draggedIdx, 1)[0];
            targetApps.splice(globalIdx, 0, movingItem);
            renderApps(currentCategory);
          });
          item.addEventListener('dragend', () => {
            item.classList.remove('dragging');
            draggedIdx = null;
          });
          
          item.addEventListener('click', (e) => {
            if (isEditMode) return e.preventDefault();
            routeToApp(app);
          });
          
          fragment.appendChild(item);
        });
        
        pageView.appendChild(fragment);
        container.appendChild(pageView);
      }

      if (pagesCount > 1) {
        for (let i = 0; i < pagesCount; i++) {
          const dot = document.createElement('div');
          dot.className = `dot ${i === 0 ? 'active' : ''}`;
          dotsContainer.appendChild(dot);
        }
      }
      updateDockUI(categoryKey);
    }

    // ==========================================================================\
    // 9. 全域 APP 深度检索与秒级渲染
    // ==========================================================================
    function handleGlobalSearch(query) {
      spotlightResults.innerHTML = '';
      if (!query) {
        spotlightResults.innerHTML = '<div class="search-tip">💡 下拉或输入应用名称，检索全站聚合矩阵</div>';
        return;
      }

      // 提取跨分类下的所有 APP 资源组
      let matchedApps = [];
      Object.keys(DATA).forEach(key => {
        DATA[key].apps.forEach(app => {
          if (app.name.toLowerCase().includes(query.toLowerCase())) {
            // 防止各分类中有重名引发冲突
            if (!matchedApps.some(m => m.name === app.name)) {
              matchedApps.push(app);
            }
          }
        });
      });

      if (matchedApps.length === 0) {
        spotlightResults.innerHTML = '<div class="search-tip">🔍 未找到匹配的应用，请检查拼写</div>';
        return;
      }

      const resultsGrid = document.createElement('div');
      resultsGrid.className = 'search-results-grid';

      matchedApps.forEach(app => {
        const item = document.createElement('div');
        item.className = 'app-item';
        item.innerHTML = `
          <div class="icon-wrapper"><span>${app.emoji}</span></div>
          <div class="app-name">${app.name}</div>
        `;
        item.addEventListener('click', () => {
          hideSpotlight();
          routeToApp(app);
        });
        resultsGrid.appendChild(item);
      });

      spotlightResults.appendChild(resultsGrid);
    }

    function routeToApp(app) {
      if (!app.url) {
        alert(`💡 「${app.name}」暂未配置跳转链接。\n提示：可通过修改源码中的 DATA 结构进行绑定。`);
      } else if (app.url.startsWith('custom://')) {
        alert(`🚀 正在接入「${app.name}」独立创作生态...\n详情请通过底部客服进行对接。`);
      } else {
        window.open(app.url, '_blank', 'noopener,noreferrer');
      }
    }

    // ==========================================================================\
    // 10. Spotlight 唤醒与隐藏引擎 (支持手势下拉)
    // ==========================================================================
    function showSpotlight() {
      if (isEditMode) return; // 编辑状态下锁定搜索
      spotlightOverlay.classList.add('active');
      setTimeout(() => spotlightInput.focus(), 150);
      handleGlobalSearch(spotlightInput.value.trim());
    }

    function hideSpotlight() {
      spotlightOverlay.classList.remove('active');
      spotlightInput.value = '';
      spotlightInput.blur();
    }

    // 交互触发器绑定
    openSearchBtn.addEventListener('click', showSpotlight);
    closeSearchBtn.addEventListener('click', hideSpotlight);
    spotlightOverlay.addEventListener('click', (e) => {
      if (e.target === spotlightOverlay) hideSpotlight();
    });
    spotlightInput.addEventListener('input', (e) => {
      handleGlobalSearch(e.target.value.trim());
    });
    // 物理键盘 ESC 快速退出
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') hideSpotlight();
    });

    // 🍏 像素级复刻 iOS 桌面任何空白处下滑（Swipe Down）呼出搜索栏
    document.getElementById('stageMain').addEventListener('touchstart', (e) => {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    document.getElementById('stageMain').addEventListener('touchend', (e) => {
      const touchEndY = e.changedTouches[0].clientY;
      // 下滑距离大于 80px 时呼出
      if (touchEndY - touchStartY > 80) {
        showSpotlight();
      }
    });

    // ==========================================================================\
    // 11. iOS 经典长按逻辑模块与辅助联动
    // ==========================================================================
    function bindLongPressEvents(el) {
      const startHandler = () => {
        if (isEditMode) return;
        pressTimer = setTimeout(() => enterEditMode(), 700);
      };
      const cancelHandler = () => clearTimeout(pressTimer);
      
      el.addEventListener('mousedown', startHandler);
      el.addEventListener('mouseup', cancelHandler);
      el.addEventListener('mouseleave', cancelHandler);
      el.addEventListener('touchstart', startHandler, { passive: true });
      el.addEventListener('touchend', cancelHandler);
      el.addEventListener('touchmove', cancelHandler);
    }

    function enterEditMode() {
      isEditMode = true;
      document.body.classList.add('editing-mode');
      renderApps(currentCategory);
    }

    exitEditBtn.addEventListener('click', () => {
      isEditMode = false;
      document.body.classList.remove('editing-mode');
      renderApps(currentCategory);
    });

    container.addEventListener('scroll', () => {
      const dots = dotsContainer.querySelectorAll('.dot');
      if (dots.length === 0) return;
      const pageIndex = Math.round(container.scrollLeft / container.clientWidth);
      dots.forEach((dot, idx) => {
        dot.classList.toggle('active', idx === pageIndex);
      });
    });

    wallpaperBtn.addEventListener('click', () => {
      currentWallpaperIdx = (currentWallpaperIdx + 1) % WALLPAPERS.length;
      document.body.style.background = WALLPAPERS[currentWallpaperIdx];
      document.body.style.backgroundSize = '400% 400%';
    });

    function updateDockUI(activeKey) {
      document.querySelectorAll('.dock-item').forEach(el => {
        const isActive = el.dataset.key === activeKey;
        el.style.opacity = isActive ? '1' : '0.55';
        el.style.background = isActive ? 'rgba(255, 255, 255, 0.22)' : 'none';
        el.style.borderRadius = '16px';
        el.style.transform = isActive ? 'scale(1.05)' : 'scale(1)';
      });
    }

    // 初始化装载 Dock 栏
    const dockFragment = document.createDocumentFragment();
    Object.keys(DATA).forEach(key => {
      const item = document.createElement('div');
      item.className = 'dock-item';
      item.dataset.key = key;
      item.innerHTML = `
        <div class="dock-icon-wrapper">
          <span class="dock-emoji">${DATA[key].short}</span>
          <span class="dock-name">${DATA[key].name}</span>
        </div>
      `;
      item.addEventListener('click', () => {
        if(isEditMode) return;
        renderApps(key);
      });
      dockFragment.appendChild(item);
    });
    dock.appendChild(dockFragment);

    renderApps('global');

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => renderApps(currentCategory), 150);
    });
  </script>
</body>
</html>
