  <style>
    /* 全局 CSS 变量定义：便于统一样式和主题维护 */
    :root {
      --text-main: #ffffff;
      --text-shadow: 0 1px 2px rgba(140, 117, 117, 0.566);
      --icon-radius: 24%; /* 经典的苹果应用图标圆角比例 */
      --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", sans-serif;
      --icon-size: 62px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      padding: 0;
      font-family: var(--font-stack);
      min-height: 100dvh; /* 适配移动端动态视口高度 */
      width: 100%;
      overflow: hidden; /* 禁止外层滚动，由内部 main 自行滚动 */
      position: relative;
      display: flex;
      flex-direction: column;
      touch-action: manipulation; /* 优化单指缩放和手势延迟 */
      overscroll-behavior: none;  /* 禁用橡皮筋下拉刷新效果 */
      -webkit-user-select: none;  /* 禁用长按选中文本 */
      user-select: none;
      -webkit-tap-highlight-color: transparent; /* 移除移动端点击高亮阴影 */
      background: #0f3460;
    }

    /* 使用伪元素制作绚丽的动态径向渐变背景 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -2;
      background: radial-gradient(circle at 10% 10%, #1a1a2e 0%, #16213e 40%, #0f3460 80%, #e94560 120%);
    }

    /* 苹果风格的高级毛玻璃背景遮罩 */
    .blur-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10, 10, 20, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 1;
      pointer-events: none; /* 允许穿透点击底层元素 */
    }

    /* 主内容区（应用图标网格容器滚动层） */
    main {
      position: relative;
      z-index: 2;
      flex: 1;
      width: 100%;
      padding: calc(40px + env(safe-area-inset-top)) 24px 20px;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch; /* 启用 iOS 原生弹性滚动 */
    }

    /* 优雅的极细滚动条设计 */
    main::-webkit-scrollbar { width: 4px; }
    main::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 10px;
    }

    /* 默认基础布局：iPhone 竖屏 */
    .app-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr); 
        gap: 32px 16px; 
        max-width: 480px;
        margin: 0 auto;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    /* 单个应用图标的点击与缩放动效 */
    .app-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      outline: none;
      transition: transform 0.2s cubic-bezier(0.33, 1, 0.68, 1);
      -webkit-tap-highlight-color: transparent;
      will-change: transform; /* 触发硬件加速 */
    }
    .app-icon:active { transform: scale(0.9); } /* 按下时缩放 */

    /* 图标外壳：包含发光阴影与平滑过渡 */
    .icon-wrapper {
      width: var(--icon-size);
      height: var(--icon-size);
      border-radius: var(--icon-radius);
      box-shadow: 0 5px 14px rgba(0, 0, 0, 0.12), inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 7px;
      position: relative;
      overflow: hidden;
      transition: transform 0.25s ease, opacity 0.25s ease, background-color 0.25s ease, box-shadow 0.25s ease, color 0.25s ease;
      contain: paint; /* 性能优化，限制重绘范围 */
    }

    .icon-wrapper svg {
      width: calc(var(--icon-size) * 0.48);
      height: calc(var(--icon-size) * 0.48);
      fill: currentColor;
      display: block;
    }

    /* 应用名称：超出长度自动变为省略号(...) */
    .app-name {
      color: var(--text-main);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.4px;
      text-align: center;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: var(--text-shadow);
      opacity: 0.92;
    }

    /* 页脚容器：固定在屏幕底部 */
    footer {
      width: 100%;
      position: fixed;
      bottom: 0;
      left: 0;
      padding-bottom: calc(12px + env(safe-area-inset-bottom)); /* 留出底部小白条安全距离 */
      padding-top: 10px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: transparent;
    }

    /* 苹果标志性的高斯模糊高亮 Dock 栏 */
    .dock-container {
      background: rgba(255, 255, 255, 0.11) !important;
      backdrop-filter: blur(18px) saturate(160%) !important;
      -webkit-backdrop-filter: blur(25px) saturate(210%) !important;
      border: 1px solid rgba(255, 255, 255, 0.18) !important;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3) !important;
      height: 64px;
      padding: 0 16px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      box-sizing: border-box;
      transition: transform 0.25s ease, opacity 0.25s ease, background-color 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      touch-action: none;
      contain: layout paint style;
    }

    .dock-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      position: relative;
      box-sizing: border-box;
      touch-action: none;
      -webkit-touch-callout: none;
      will-change: transform;
    }

    .dock-icon-wrapper {
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 0.25s ease, opacity 0.25s ease, background-color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      box-sizing: border-box;
      padding: 4px;
    }

    .dock-emoji { font-size: 18px; line-height: 1; transition: transform 0.25s ease; }
    .dock-name {
      color: #ffffff; font-size: 9px; font-weight: 500; margin-top: 3px; opacity: 0.75;
      white-space: nowrap; text-shadow: var(--text-shadow);
      transition: color 0.25s ease, opacity 0.25s ease, font-weight 0.25s ease;
    }

    /* 当 Dock 项目被激活/选中时的外观（高级反色：高亮白底、黑字加粗） */
    .dock-item.active .dock-icon-wrapper {
      background: rgba(255, 255, 255, 0.95) !important;
      box-shadow: 0 4px 15px rgba(255, 255, 255, 0.25) !important;
      border-color: rgba(255, 255, 255, 1) !important;
    }
    .dock-item.active .dock-emoji { transform: scale(1.12); }
    .dock-item.active .dock-name { color: #121212 !important; font-weight: 600; opacity: 1; }
    .dock-item:active .dock-icon-wrapper { transform: scale(0.88); }

    .user-signature {
      font-size: 11px; color: rgba(255, 255, 255, 0.45); letter-spacing: 0.6px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3); display: flex; flex-direction: column; align-items: center; gap: 5px;
      user-select: text; -webkit-user-select: text; /* 允许复制信息 */
    }

    /* -------------------------------------------------------------
       媒体查询（Media Queries）：针对平板、PC、横屏等不同设备分辨率的高级自适应调优
       ------------------------------------------------------------- */
    @media (min-width: 600px) and (max-width: 1024px) and (orientation: portrait) {
      :root { --icon-size: 64px; }
      .app-grid { grid-template-columns: repeat(6, 1fr) !important; max-width: 680px; gap: 36px 18px !important; }
      .dock-container { height: 70px; padding: 0 20px; gap: 20px; }
      .dock-icon-wrapper { width: 56px; height: 56px; border-radius: 14px; }
      .dock-emoji { font-size: 22px; } .dock-name { font-size: 10px; }
    }
    @media (min-width: 600px) and (max-width: 1366px) and (orientation: landscape) {
      :root { --icon-size: 62px; }

      .app-grid { grid-template-columns: repeat(8, 1fr) !important; max-width: 860px; gap: 24px 18px !important; }
      .dock-container { height: 70px; padding: 0 20px; gap: 20px; }
      .dock-icon-wrapper { width: 56px; height: 56px; border-radius: 14px; }
      .dock-emoji { font-size: 22px; } .dock-name { font-size: 10px; }
    }
    @media (min-width: 1367px) {

      .dock-icon-wrapper { width: 60px; height: 60px; border-radius: 15px; }

    }
    @media (orientation: landscape) and (max-height: 500px) {

      .app-grid { grid-template-columns: repeat(8, 1fr) !important; gap: 10px 14px !important; max-width: 680px; }
      .icon-wrapper { margin-bottom: 3px; }
      .app-name { font-size: 10px; }
      footer { padding-bottom: calc(5px + env(safe-area-inset-bottom)) !important; gap: 4px; }
      .user-signature { flex-direction: row !important; gap: 20px; font-size: 10px; }
      .dock-container { height: 38px !important; gap: 10px !important; padding: 0 10px !important; border-radius: 12px !important; }
      .dock-item { flex-direction: row !important; }
      .dock-icon-wrapper { flex-direction: row !important; width: auto !important; height: 30px !important; padding: 0 10px !important; gap: 5px !important; border-radius: 8px !important; }
      .dock-emoji { font-size: 14px !important; } .dock-name { margin-top: 0 !important; font-size: 10px !important; opacity: 0.9; }
    }
  </style>

    // 智能渲染特定分类下的应用网格
    function renderApps(categoryKey) {
      // 动态更新底部 Dock 的高亮 Active 状态
      document.querySelectorAll('.dock-item').forEach(item => {
        if (item.dataset.key === categoryKey) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });

      const grid = document.getElementById('grid');
      grid.innerHTML = ''; // 清空原有内容

      const apps = DATA[categoryKey]?.items || [];
      const fragment = document.createDocumentFragment(); // 使用轻量级 Fragment 防止重排

      for (const app of apps) {
        const item = document.createElement('div');
        item.className = 'app-icon';
        item.tabIndex = 0; // 无障碍键盘聚焦支持
        item.title = app.desc || '';
        item.innerHTML = `
          <div class="icon-wrapper" style="background:${app.bg};color:${app.color};">
            ${app.svg}
          </div>
          <div class="app-name">${app.name}</div>
        `;
        
        // 点击跳转逻辑
        item.addEventListener('click', () => {
          if (app.url.startsWith('wechat:')) {
            alert(`正在接入「${app.name}」创作生态...\n详情请通过底部微信号进行联系。`);
          } else {
            window.open(app.url, '_blank', 'noopener,noreferrer');
          }
        });
        
        // 键盘回车与空格键支持
        item.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            item.click();
          }
        });
        fragment.appendChild(item);
      }

      grid.appendChild(fragment);
    }

    // 动态初始化构建底部 Dock 导航栏
    const dock = document.getElementById('dock');
    const dockFragment = document.createDocumentFragment();
    for (const key of Object.keys(DATA)) {
      const item = document.createElement('div');
      item.className = 'dock-item';
      item.dataset.key = key;
      item.title = DATA[key].name;
      item.innerHTML = `
        <div class="dock-icon-wrapper">
          <span class="dock-emoji">${DATA[key].short}</span>
          <span class="dock-name">${DATA[key].name}</span>
        </div>
      `;
      item.addEventListener('click', () => renderApps(key));
      dockFragment.appendChild(item);
    }
    dock.appendChild(dockFragment);

    // 默认加载首屏分类：'global' (国际平台)
    renderApps('global');

    // 注册 PWA 离线 Service Worker 支持
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
