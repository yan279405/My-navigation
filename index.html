<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Creator Hub OS26 - Strict 3-Column</title>
<style>
    :root {
        --bg-dark: #000000;
        --text-main: #ffffff;
        --text-secondary: #8e8e93;
        --accent: #0a84ff;
        --glass-border: rgba(255, 255, 255, 0.1);
        --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    /* 限制整体视窗，确保全平台在任何旋转方向下都不会发生上下左右的溢出抖动 */
    body {
        margin: 0;
        background: var(--bg-dark);
        color: var(--text-main);
        font-family: var(--font-stack);
        height: 100vh;
        display: flex;
        overflow: hidden;
        width: 100vw;
    }

    /* ==================== 严格的 1:2:1 三栏完美同步架构 ==================== */
    
    /* 1. 左栏 (导航边栏) - 占全屏 1/4 (25%) */
    .sidebar {
        width: 25vw;
        background: transparent; 
        border-right: 1px solid var(--glass-border);
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow-y: auto;
        flex-shrink: 0;
    }

    /* 2. 中栏 (卡片内容区) - 占全屏 2/4 (50%) */
    .main {
        width: 50vw;
        flex: 1;
        overflow-y: auto;
        padding: 40px 24px;
        display: flex;
        flex-direction: column;
        align-items: center; /* 保证卡片流在中间区域绝对居中 */
    }
    
    .content-wrapper {
        width: 100%;
        max-width: 680px; /* 约束最大宽度，防止大屏拉伸 */
    }

    /* 卡片网格 */
    .grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
        gap: 16px; 
        width: 100%;
    }
    
    /* 卡片内部排版：容器居中，文字偏左 */
    .card {
        background: rgba(255,255,255,0.05);
        padding: 20px;
        border-radius: 16px;
        border: 1px solid var(--glass-border);
        cursor: pointer;
        transition: transform 0.2s, background 0.2s;
        display: flex;
        flex-direction: column;
        align-items: center; 
    }
    .card:active { transform: scale(0.97); }
    .card:hover { background: rgba(255,255,255,0.08); }
    
    .card-content {
        width: 100%;
        max-width: 160px; /* 控制文字对齐基准线 */
        text-align: left;
    }

    /* 3. 右栏 (控制与设置栏) - 占全屏 1/4 (25%) */
    .panel-right {
        width: 25vw;
        background: transparent;
        border-left: 1px solid var(--glass-border);
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        overflow-y: auto;
        flex-shrink: 0;
    }

    /* ==================== 基本组件样式 ==================== */
    .profile-zone { text-align: center; margin-bottom: 20px; }
    .avatar { width: 70px; height: 70px; border-radius: 18px; background: #222; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 28px; border: 1px solid var(--glass-border); }
    .profile-name { font-weight: 600; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .nav-item {
        padding: 12px 14px;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
    .nav-item.active { background: var(--accent); color: white; font-weight: 600; }

    .section-title { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .setting-card { background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }

    /* ==================== 针对 iPad 竖屏与大屏手机的微调断点 ==================== */
    /* 彻底移除了“display: none”隐藏逻辑，改为缩放UI，使其在小屏幕下依然整齐展现 1:2:1 */
    @media (max-width: 834px) {
        /* 精细化缩放两边栏内边距，给中间空出舞台 */
        .sidebar, .panel-right {
            padding: 24px 12px;
        }
        
        .main {
            padding: 24px 14px;
        }

        /* 缩减头像和文字大小，防止横向撑破或溢出 */
        .avatar { width: 44px; height: 44px; border-radius: 12px; font-size: 20px; }
        .profile-name { font-size: 13px; }
        .nav-item { padding: 10px 8px; font-size: 13px; }
        
        /* 移动端/小ipad下中间卡片自动变为 1 列或 2 列自适应，并保持防误触边距 */
        .grid { 
            grid-template-columns: 1fr; 
            gap: 12px;
        }
        
        h1#title { font-size: 22px !important; margin-bottom: 16px !important; }
        .setting-card { padding: 10px; font-size: 12px; }
    }
</style>
</head>
<body>

<nav class="sidebar" id="sidebar"></nav>

<main class="main">
    <div class="content-wrapper">
        <h1 id="title" style="margin: 0 0 24px 0; font-size: 26px; font-weight: 700;">Creator Hub</h1>
        <div class="grid" id="grid"></div>
    </div>
</main>

<aside class="panel-right">
    <div>
        <div class="section-title">Control Center</div>
        <div class="setting-card">
            <span>Focus Mode</span>
            <span style="color: var(--accent); font-weight: 600;">ON</span>
        </div>
    </div>
    <div>
        <div class="section-title">System Status</div>
        <div class="setting-card" style="flex-direction: column; align-items: flex-start; gap: 6px;">
            <div style="display: flex; justify-content: space-between; width: 100%;">
                <span>iCloud Sync</span>
                <span style="color: #34c759;">Updated</span>
            </div>
            <div style="display: flex; justify-content: space-between; width: 100%;">
                <span>Storage</span>
                <span style="color: var(--text-secondary);">64% Used</span>

    </div>
</aside>

    const sidebar = document.getElementById('sidebar');

    function render(key) {
        const data = DATA[key];
        document.getElementById('title').innerText = data.name;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.key === key));
        const grid = document.getElementById('grid');
        
        grid.innerHTML = data.items.map(item => `
            <div class="card" onclick="window.open('${item.url}', '_blank')">
                <div class="card-content">
                    <div style="font-size: 24px; margin-bottom: 10px;">${item.icon}</div>
                    <div style="font-weight: 600; line-height: 1.3;">${item.name}</div>
                    <div style="font-size: 13px; color: var(--text-secondary); margin-top: 5px; line-height: 1.4;">${item.desc}</div>
                </div>
            </div>
        `).join('');
    }

    // 初始化加载左侧面板
    sidebar.innerHTML = `
        <div class="profile-zone">
            <div class="avatar"></div>
            <div class="profile-name">颜途的视界</div>
        </div>
    `;
    
    Object.keys(DATA).forEach(key => {
        const item = document.createElement('div');
        item.className = 'nav-item';
        item.dataset.key = key;
        item.innerHTML = `<span>${DATA[key].name}</span>`;
        item.onclick = () => render(key);
        sidebar.appendChild(item);
    });

    render('cn'); 
</script>

</html>
