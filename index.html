<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>颜途的视界 · Matrix OS V3.2</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#020617;
    --card:rgba(255,255,255,.05);
    --border:rgba(255,255,255,.08);
    --text:#fff;
    --sub:#94a3b8;
    --accent:#38bdf8;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "PingFang SC",
        sans-serif;
    overflow:hidden;
}

/* 星空 */

#stars{
    position:fixed;
    inset:0;
    z-index:-3;
}

/* 鼠标流光 */

#glow{
    position:fixed;
    width:500px;
    height:500px;
    border-radius:50%;
    background:
        radial-gradient(
            rgba(56,189,248,.15),
            transparent
        );
    filter:blur(80px);
    pointer-events:none;
    z-index:-2;
}

/* 主布局 */

.app{
    display:flex;
    height:100vh;
}

/* 左侧 */

.sidebar{

    width:320px;

    background:
        rgba(15,23,42,.72);

    backdrop-filter:
        blur(40px);

    border-right:
        1px solid var(--border);

    padding:30px;
}

.avatar{

    width:100px;
    height:100px;

    border-radius:50%;

    background:
        linear-gradient(
            135deg,
            #38bdf8,
            #6366f1
        );

    margin:auto;
}

.profile{
    text-align:center;
}

.profile h1{
    margin-top:20px;
}

.profile p{
    color:var(--sub);
}

/* 导航 */

.menu{
    margin-top:40px;
}

.item{

    padding:18px;

    border-radius:16px;

    margin-bottom:12px;

    background:
        rgba(255,255,255,.04);

    cursor:pointer;

    transition:.3s;
}

.item:hover{

    transform:
        translateX(8px);
}

.item.active{

    background:
        rgba(56,189,248,.2);

    border:
        1px solid var(--accent);
}

/* 右侧 */

.main{

    flex:1;

    overflow:auto;

    padding:40px;
}

/* 卡片 */

.card{

    background:
        var(--card);

    backdrop-filter:
        blur(30px);

    border:
        1px solid var(--border);

    border-radius:28px;

    overflow:hidden;

    margin-bottom:30px;

    box-shadow:
        0 20px 60px
        rgba(0,0,0,.4);
}

/* Hero */

.hero{

    height:300px;

    background:
        linear-gradient(
            135deg,
            #38bdf8,
            #6366f1
        );

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:120px;
}

/* 内容 */

.content{
    padding:30px;
}

/* 数据 */

.dashboard{

    display:grid;

    grid-template-columns:
        repeat(4,1fr);

    gap:20px;

    margin:25px 0;
}

.metric{

    background:
        rgba(255,255,255,.04);

    padding:20px;

    border-radius:18px;
}

.metric b{

    display:block;

    font-size:30px;

    margin-bottom:8px;
}

/* 作品墙 */

.gallery{

    display:grid;

    grid-template-columns:
        repeat(4,1fr);

    gap:20px;
}

.work{

    height:220px;

    border-radius:18px;

    background:
        linear-gradient(
            135deg,
            #111827,
            #1e293b
        );

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:50px;

    transition:.3s;
}

.work:hover{

    transform:
        scale(1.05)
        translateY(-8px);
}

</style>
</head>

<body>

<canvas id="stars"></canvas>
<div id="glow"></div>

<div class="app">

    <aside class="sidebar">

        <div class="profile">

            <div class="avatar"></div>

            <h1>颜途视界</h1>

            <p>旅行 × 人文 × 纪录片</p>

        </div>

        <div class="menu">

            <div class="item active">
                📺 Bilibili
            </div>

            <div class="item">
                📕 小红书
            </div>

            <div class="item">
                🎵 抖音
            </div>

            <div class="item">
                ▶ YouTube
            </div>

            <div class="item">
                ✖ X
            </div>

        </div>

    </aside>

    <main class="main">

        <div class="card">

            <div class="hero">
                📺
            </div>

            <div class="content">

                <h1>
                    我的 Bilibili
                </h1>

                <div class="dashboard">

                    <div class="metric">
                        <b>12.3W</b>
                        粉丝
                    </div>

                    <div class="metric">
                        <b>326</b>
                        视频
                    </div>

                    <div class="metric">
                        <b>890W</b>
                        播放
                    </div>

                    <div class="metric">
                        <b>+23%</b>
                        增长
                    </div>

                </div>

            </div>

        </div>

        <div class="gallery">

            <div class="work">🎬</div>
            <div class="work">🌄</div>
            <div class="work">🚂</div>
            <div class="work">🌾</div>
            <div class="work">🏔</div>
            <div class="work">🌊</div>
            <div class="work">🏕</div>
            <div class="work">🛶</div>

        </div>

    </main>

</div>

<script>

/* 鼠标流光 */

document.addEventListener(
'mousemove',
e=>{

    glow.style.left=
        e.clientX-250+'px';

    glow.style.top=
        e.clientY-250+'px';
});

/* 星空 */

const canvas=
document.getElementById('stars');

const ctx=
canvas.getContext('2d');

canvas.width=
innerWidth;

canvas.height=
innerHeight;

const stars=[];

for(let i=0;i<200;i++){

    stars.push({

        x:Math.random()*canvas.width,

        y:Math.random()*canvas.height,

        r:Math.random()*2,

        s:Math.random()*0.5
    });
}

function draw(){

    ctx.clearRect(
        0,0,
        canvas.width,
        canvas.height
    );

    ctx.fillStyle=
        "white";

    stars.forEach(s=>{

        ctx.beginPath();

        ctx.arc(
            s.x,
            s.y,
            s.r,
            0,
            Math.PI*2
        );

        ctx.fill();

        s.y+=s.s;

        if(
            s.y>
            canvas.height
        ) s.y=0;
    });

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
