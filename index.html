<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>二哥｜全平台聚合主页</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
        linear-gradient(
            135deg,
            #0f172a,
            #1e293b,
            #312e81
        );
    color:#fff;
    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "PingFang SC",
        sans-serif;
    overflow:hidden;
}

/* 左侧 */
.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:300px;
    height:100vh;

    background:rgba(15,23,42,.85);
    backdrop-filter:blur(25px);

    border-right:
        1px solid rgba(255,255,255,.08);

    padding:30px;
}

.avatar{
    width:100px;
    height:100px;
    border-radius:50%;
    background:#334155;
    margin:auto;
    margin-bottom:20px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:40px;
}

.name{
    text-align:center;
    font-size:28px;
    font-weight:700;
}

.desc{
    text-align:center;
    color:#94a3b8;
    margin-top:10px;
    margin-bottom:30px;
}

.nav-btn{
    width:100%;
    border:none;
    cursor:pointer;

    padding:16px;
    margin-bottom:12px;

    background:#1e293b;
    color:white;

    border-radius:14px;

    text-align:left;

    transition:.3s;
}

.nav-btn:hover{
    transform:translateX(8px);
    background:#334155;
}

.nav-btn.active{
    background:
        linear-gradient(
            135deg,
            #38bdf8,
            #6366f1
        );
}

/* 右侧 */
.main{
    margin-left:300px;
    height:100vh;
    overflow:auto;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:50px;
}

.panel{
    display:none;

    width:100%;
    max-width:900px;

    background:
        rgba(30,41,59,.8);

    backdrop-filter:blur(20px);

    border-radius:30px;

    padding:50px;

    animation:fade .35s;
}

.panel.active{
    display:block;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:none;
    }
}

.platform{
    font-size:42px;
    margin-bottom:20px;
}

.info{
    font-size:20px;
    line-height:2;
    color:#cbd5e1;
}

.visit{
    display:inline-block;

    margin-top:30px;

    padding:16px 35px;

    background:
        linear-gradient(
            135deg,
            #38bdf8,
            #6366f1
        );

    color:white;
    text-decoration:none;

    border-radius:15px;

    transition:.3s;
}

.visit:hover{
    transform:translateY(-3px);
}

.stats{
    display:flex;
    gap:20px;
    margin-top:25px;
}

.card{
    background:#0f172a;
    padding:20px;
    border-radius:15px;
    flex:1;
}

.card h3{
    color:#94a3b8;
    font-size:14px;
}

.card p{
    font-size:24px;
    margin-top:10px;
}

@media(max-width:900px){

    body{
        overflow:auto;
    }

    .sidebar{
        position:relative;
        width:100%;
        height:auto;
    }

    .main{
        margin-left:0;
        height:auto;
    }
}
</style>
</head>

<body>

<!-- 左侧 -->
<div class="sidebar">

    <div class="avatar">👤</div>

    <div class="name">二哥</div>

    <div class="desc">
        旅行 · 人文 · 纪录片创作者
    </div>

    <div id="nav"></div>

</div>

<!-- 右侧 -->
<div class="main">

    <div id="content"></div>

</div>

<script>

const CONFIG = [

{
    id:"bili",
    icon:"📺",
    name:"Bilibili",
    fans:"15万+",
    works:"300+",
    intro:"旅行人文纪录片创作者",
    url:"https://space.bilibili.com/你的UID"
},

{
    id:"xhs",
    icon:"📕",
    name:"小红书",
    fans:"3万+",
    works:"200+",
    intro:"旅行摄影生活分享",
    url:"https://www.xiaohongshu.com"
},

{
    id:"dy",
    icon:"🎵",
    name:"抖音",
    fans:"8万+",
    works:"500+",
    intro:"短纪录片与旅行Vlog",
    url:"https://www.douyin.com"
},

{
    id:"yt",
    icon:"▶",
    name:"YouTube",
    fans:"1万+",
    works:"100+",
    intro:"海外旅行纪录片频道",
    url:"https://youtube.com"
},

{
    id:"x",
    icon:"𝕏",
    name:"X",
    fans:"5000+",
    works:"1000+",
    intro:"实时动态与观点分享",
    url:"https://x.com"
}

];

const nav=document.getElementById("nav");
const content=document.getElementById("content");

CONFIG.forEach((p,i)=>{

    nav.innerHTML+=`
    <button
        class="nav-btn ${i==0?'active':''}"
        onclick="show('${p.id}',this)">
        ${p.icon} ${p.name}
    </button>
    `;

    content.innerHTML+=`
    <div class="panel ${i==0?'active':''}"
         id="${p.id}">

        <div class="platform">
            ${p.icon} ${p.name}
        </div>

        <div class="info">
            ${p.intro}
        </div>

        <div class="stats">

            <div class="card">
                <h3>粉丝</h3>
                <p>${p.fans}</p>
            </div>

            <div class="card">
                <h3>作品</h3>
                <p>${p.works}</p>
            </div>

        </div>

        <div style="margin-top:30px;">
            欢迎访问我的 ${p.name} 官方主页，
            浏览全部视频、动态和内容更新。
        </div>

        <a
            class="visit"
            href="${p.url}"
            target="_blank">

            进入 ${p.name} →
        </a>

    </div>
    `;
});

function show(id,btn){

    document
        .querySelectorAll('.panel')
        .forEach(
            p=>p.classList.remove('active')
        );

    document
        .querySelectorAll('.nav-btn')
        .forEach(
            p=>p.classList.remove('active')
        );

    document
        .getElementById(id)
        .classList.add('active');

    btn.classList.add('active');
}

</script>

</body>
</html>
