<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Creator Hub OS26</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --glass:
        rgba(255,255,255,.08);

    --border:
        rgba(255,255,255,.12);

    --text:
        #ffffff;

    --sub:
        #94a3b8;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "SF Pro Display",
    "PingFang SC",
    sans-serif;
}

body{

    background:
    linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #1e293b,
        #312e81
    );

    background-size:
        400% 400%;

    animation:
        bgMove 20s ease infinite;

    color:white;
}

@keyframes bgMove{

    0%{
        background-position:
        0% 50%;
    }

    50%{
        background-position:
        100% 50%;
    }

    100%{
        background-position:
        0% 50%;
    }
}

/* 启动画面 */

.splash{

    position:fixed;

    inset:0;

    z-index:9999;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    background:#020617;

    animation:
        splashHide
        2.5s
        forwards;
}

.logo{

    font-size:90px;

    animation:
        breathe
        2s
        infinite;
}

.name{

    margin-top:20px;

    font-size:32px;

    font-weight:700;
}

.sub{

    margin-top:10px;

    color:#94a3b8;
}

@keyframes breathe{

    50%{
        transform:scale(1.1);
    }
}

@keyframes splashHide{

    80%{
        opacity:1;
    }

    100%{
        opacity:0;
        visibility:hidden;
    }
}

/* 主界面 */

.app{

    display:flex;

    width:100vw;

    height:100vh;
}

/* 左侧 */

.sidebar{

    width:320px;

    height:100vh;

    padding:30px;

    backdrop-filter:
        blur(40px);

    background:
        rgba(15,23,42,.55);

    border-right:
        1px solid var(--border);
}

.avatar{

    width:120px;

    height:120px;

    border-radius:50%;

    margin:auto;

    background:
        linear-gradient(
            135deg,
            #38bdf8,
            #6366f1
        );

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:48px;

    font-weight:700;
}

.username{

    margin-top:20px;

    text-align:center;

    font-size:32px;

    font-weight:700;
}

.bio{

    margin-top:10px;

    text-align:center;

    color:var(--sub);

    line-height:1.8;
}

.menu{

    margin-top:40px;

    display:flex;

    flex-direction:column;

    gap:12px;
}

.menu button{

    height:60px;

    border:none;

    border-radius:20px;

    background:
        rgba(255,255,255,.05);

    color:white;

    font-size:16px;

    cursor:pointer;

    transition:.3s;
}

.menu button:hover{

    transform:
        translateX(8px);

    background:
        rgba(255,255,255,.12);
}

/* 右侧 */

.main{

    flex:1;

    padding:30px;

    overflow:auto;
}

.hero{

    height:220px;

    border-radius:30px;

    backdrop-filter:
        blur(50px);

    background:
        rgba(255,255,255,.08);

    border:
        1px solid
        rgba(255,255,255,.1);

    padding:50px;

    display:flex;

    flex-direction:column;

    justify-content:center;
}

.hero h1{

    font-size:48px;
}

.hero p{

    margin-top:15px;

    color:#cbd5e1;
}

.cards{

    margin-top:30px;

    display:grid;

    grid-template-columns:
        repeat(
            auto-fit,
            minmax(260px,1fr)
        );

    gap:20px;
}

.card{

    height:160px;

    border-radius:30px;

    backdrop-filter:
        blur(40px);

    background:
        rgba(255,255,255,.06);

    border:
        1px solid
        rgba(255,255,255,.1);

    padding:25px;

    transition:.3s;
}

.card:hover{

    transform:
        translateY(-10px);
}

.card-title{

    font-size:22px;

    font-weight:700;
}

.card-sub{

    margin-top:15px;

    color:#94a3b8;
}

@media(max-width:900px){

    .app{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
        height:auto;
    }
}

</style>
</head>

<body>

<div class="splash">

    <div class="logo"></div>

    <div class="name">
        Creator Hub
    </div>

    <div class="sub">
        Apple OS26 Experience
    </div>

</div>

<div class="app">

    <div class="sidebar">

        <div class="avatar">
            昵称
        </div>

        <div class="username">
            昵称
        </div>

        <div class="bio">
            Travel · Human
            <br>
            Documentary Creator
        </div>

        <div class="menu">

            <button>
                📺 国内平台
            </button>

            <button>
                ▶ 国际平台
            </button>

            <button>
                ♪ 流媒体
            </button>

            <button>
                💼 商务合作
            </button>

        </div>

    </div>

    <div class="main">

        <div class="hero">

            <h1>
                🍎 Creator Hub OS26
            </h1>

            <p>
                iPhoneOS26 + iPadOS26 + VisionOS
            </p>

        </div>

        <div class="cards">

            <div class="card">
                <div class="card-title">
                    📺 Bilibili
                </div>
                <div class="card-sub">
                    中国视频创作平台
                </div>
            </div>

            <div class="card">
                <div class="card-title">
                    📕 小红书
                </div>
                <div class="card-sub">
                    旅行与生活记录
                </div>
            </div>

            <div class="card">
                <div class="card-title">
                    🎵 抖音
                </div>
                <div class="card-sub">
                    短纪录片频道
                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
