<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的全平台主页</title>
    <style>
        /* CSS 样式保持不变，只为了让配置生效 */
        :root { --bg-color: #0f172a; --sidebar-bg: #1e293b; --text-main: #f8fafc; }
        body { margin: 0; display: flex; height: 100vh; background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; }
        .sidebar { width: 280px; background-color: var(--sidebar-bg); padding: 20px; }
        .main-content { flex-grow: 1; padding: 40px; }
        .nav-btn { display: block; width: 100%; padding: 10px; margin-bottom: 10px; background: #334155; color: white; border: none; cursor: pointer; text-align: left; border-radius: 5px; }
        .panel { display: none; }
        .panel.active { display: block; }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        </aside>

    <main class="main-content" id="main-content">
        </main>

    <script>
        // ==========================================
        // 🚀 你的后台配置区：在这里修改你的信息！
        // ==========================================
        const CONFIG = {
            name: "颜哥的创作者空间",
            title: "全平台账号矩阵",
            avatar: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150",
            platforms: [
                { id: "bili", name: "📺 Bilibili", link: "你的B站主页链接" },
                { id: "xhs", name: "📕 小红书", link: "你的小红书主页链接" },
                { id: "douyin", name: "🎵 抖音", link: "https://www.douyin.com/user/MS4wLjABAAAAM38iQyoeUDgM1yQvv0A-2NoFUDn2AGrAorbl7v0OBis" },
                { id: "youtube", name: "▶️ YouTube", link: "你的YouTube链接" }
                // 你可以在这里无限添加更多平台，格式：{ id: "英文名", name: "显示名", link: "你的网址" }
            ]
        };

        // 自动渲染函数
        function render() {
            const sidebar = document.getElementById('sidebar');
            const main = document.getElementById('main-content');
            
            sidebar.innerHTML = `
                <div style="text-align:center; margin-bottom:20px;">
                    <img src="${CONFIG.avatar}" style="width:70px; border-radius:50%;">
                    <h3>${CONFIG.name}</h3>
                    <p style="font-size:12px; color:#94a3b8;">${CONFIG.title}</p>
                </div>
            `;

            CONFIG.platforms.forEach((p, index) => {
                // 渲染按钮
                sidebar.innerHTML += `<button class="nav-btn ${index === 0 ? 'active' : ''}" onclick="show('${p.id}')">${p.name}</button>`;
                // 渲染内容区
                main.innerHTML += `
                    <div id="${p.id}" class="panel ${index === 0 ? 'active' : ''}">
                        <h1>${p.name}</h1>
                        <a href="${p.link}" target="_blank" style="padding:15px; background:blue; color:white; text-decoration:none; border-radius:5px;">前往主页 →</a>
                    </div>
                `;
            });
        }

        function show(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        render();
    </script>
</body>
</html>
