<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Creator Hub OS26</title>
<style>
    :root {
        --bg-dark: #000000;
        --sidebar-bg: rgba(28, 28, 30, 0.85);
        --text-main: #ffffff;
        --text-secondary: #8e8e93;
        --accent: #0a84ff;
        --glass-border: rgba(255, 255, 255, 0.1);
        --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
        margin: 0;
        background: var(--bg-dark);
        color: var(--text-main);
        font-family: var(--font-stack);
        height: 100vh;
        display: flex;
        overflow: hidden;
        position: relative;
    }

    /* 侧边栏基础样式（适用于 Mac / iPad 横屏） */
    .sidebar {
        width: 280px;
        background: var(--sidebar-bg);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        border-right: 1px solid var(--glass-border);
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow-y: auto;
        flex-shrink: 0;
        z-index: 1000;
        transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), width 0.4s, padding 0.4s;
    }

    .profile-zone { text-align: center; margin-bottom: 20px; transition: opacity 0.3s; }
    .avatar { width: 80px; height: 80px; border-radius: 20px; background: #333; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; }
    
    .nav-item {
        padding: 14px 18px;
        border-radius: 12px;
        cursor: pointer;
        transition: background 0.3s, color 0.3s;
        color: var(--text-secondary);
        white-space: nowrap;
    }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
    .nav-item.active { background: var(--accent); color: white; font-weight: 600; }

    /* 汉堡菜单按钮 (仅移动端) */
    .menu-btn {
        display: none;
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 1001;
        font-size: 24px;
        cursor: pointer;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        width: 44px;
        height: 44px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--glass-border);
    }

    /* 遮罩层 (仅移动端) */
    .sidebar-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        z-index: 999;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s ease;
    }

    /* 主内容区 */
    .main {
        flex: 1;
        overflow-y: auto;
        padding: 40px;
        padding-top: 80px;
        transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        will-change: transform;
    }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .card {
        background: rgba(255,255,255,0.05);
        padding: 20px;
        border-radius: 16px;
        border: 1px solid var(--glass-border);
        cursor: pointer;
        transition: transform 0.2s, background 0.2s;
    }
    .card:active { transform: scale(0.97); }
    .card:hover { background: rgba(255,255,255,0.1); }

    /* 📱 移动端与竖屏响应式适配 (iPhone / iPad 竖屏) */
    @media (max-width: 768px) {
        .menu-btn { display: flex; }
        
        /* 侧边栏默认缩小悬浮形态 */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: 12px; /* 边缘悬浮缩小状态的宽度 */
            padding: 40px 0;
            background: rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transform: translateX(-1px);
            box-shadow: none;
        }
        
        /* 隐藏缩小悬浮状态下的文字与头像 */
        .sidebar .profile-zone, 
        .sidebar .nav-item {
            opacity: 0;
            pointer-events: none;
        }

        /* 激活展开状态 */
        body.sidebar-active .sidebar {
            width: 280px;
            padding: 40px 20px;
            background: var(--sidebar-bg);
            transform: translateX(0);
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }
        body.sidebar-active .sidebar .profile-zone,
        body.sidebar-active .sidebar .nav-item {
            opacity: 1;
            pointer-events: auto;
        }

        /* 激活时显示遮罩 */
        body.sidebar-active .sidebar-overlay {
            opacity: 1;
            pointer-events: auto;
        }

        /* 主内容体整体往右移至约1/4屏幕处 */
        body.sidebar-active .main {
            transform: translateX(25vw);
        }

        .main {
            padding: 80px 20px 40px 20px;
        }
    }
</style>
</head>
<body id="body-container">

<div class="menu-btn" id="menu-toggle" onclick="toggleMenu(event)">☰</div>
<div class="sidebar-overlay" id="overlay" onclick="closeMenu()"></div>
<nav class="sidebar" id="sidebar"></nav>

<main class="main">
    <h1 id="title" style="margin-bottom: 20px;">Creator Hub</h1>
    <div class="grid" id="grid"></div>
</main>

    const DATA = {

        ]},
        global: { name: '国际平台', items: [

            {icon: "♫", name: "TikTok", desc: "全球短视频趋势", url: "https://tiktok.com"},

            {icon: "💼", name: "LinkedIn", desc: "职业与商业履历", url: "https://linkedin.com"}
        ]},
        media: { name: '流媒体', items: [
            {icon: "N", name: "Netflix", desc: "流媒体影视", url: "https://netflix.com"},
            {icon: "🍎", name: "Apple TV+", desc: "原创高品质剧集", url: "https://tv.apple.com"},
            {icon: "D", name: "Disney+", desc: "迪士尼流媒体", url: "https://disneyplus.com"},
            {icon: "P", name: "Prime Video", desc: "亚马逊流媒体", url: "https://primevideo.com"},
            {icon: "H", name: "HBO Max", desc: "华纳顶级剧集", url: "https://max.com"},
            {icon: "♪", name: "Spotify", desc: "播客与音乐库", url: "https://spotify.com"},
            {icon: "🎵", name: "Apple Music", desc: "高清音乐歌单", url: "https://music.apple.com"}
        ]},
        news: { name: '资讯', items: [
            {icon: "📰", name: "澎湃新闻", desc: "时事要闻", url: "https://www.thepaper.cn"},
            {icon: "📰", name: "纽约时报", desc: "国际时事", url: "https://nytimes.com"},

            {icon: "🦊", name: "Fox News", desc: "福克斯新闻", url: "https://www.foxnews.com"},
            {icon: "🗞️", name: "华盛顿邮报", desc: "华盛顿邮报", url: "https://www.washingtonpost.com"},
            {icon: "🇬🇧", name: "BBC News", desc: "BBC News 中文", url: "https://www.bbc.com/zhongwen/simp"},
            {icon: "⚡", name: "Yahoo", desc: "雅虎新闻", url: "https://news.yahoo.com"},
            {icon: "📰", name: "Google", desc: "Google 新闻", url: "https://news.google.com"},
            {icon: "📖", name: "纽约时报", desc: "纽约时报中文网", url: "https://cn.nytimes.com"},
            {icon: "🌏", name: "路透社", desc: "突发国际新闻", url: "https://cn.reuters.com"},
            {icon: "💼", name: "华尔街日报", desc: "华尔街日报中文网", url: "https://cn.wsj.com"},
            {icon: "💰", name: "FT中文网", desc: "全球财经新闻", url: "https://www.ftchinese.com"},
            {icon: "🇫🇷", name: "法广", desc: "法广时事与新闻", url: "https://www.rfi.fr/cn"},
            {icon: "🇩🇪", name: "德国之声", desc: "在线报导", url: "https://www.dw.com/zh"},
            {icon: "🇨🇳", name: "ChinaNews", desc: "海外中国新闻", url: "https://www.chinanews.com.cn"},
            {icon: "明", name: "明报", desc: "明报网站", url: "https://news.mingpao.com"},
            {icon: "联", name: "联合新闻网", desc: "联合新闻网", url: "https://udn.com"},
            {icon: "🇱🇹", name: "自由时报", desc: "自由时报电子报", url: "https://www.ltn.com.tw"},
            {icon: "🇸🇬", name: "联合早报", desc: "国际版首页", url: "https://www.zaobao.com.sg"}
        ]},
        graphic: { name: '图文', items: [
            {icon: "🛍️", name: "淘宝", desc: "在线购物", url: "https://taobao.com"},
            {icon: "🛍️", name: "京东", desc: "在线购物", url: "https://jd.com"}
        ]},
        other: { name: '其他', items: [
            {icon: "⚪", name: "待定", desc: "空数据测试", url: "#"}
        ]},
        business: { name: '商务', items: [
            {icon: "💼", name: "商务合作", desc: "联系邮箱/合作", url: "mailto:example@email.com"},
            {icon: "📊", name: "Media Kit", desc: "创作者数据看板", url: "#"}
        ]}
    };

    const bodyContainer = document.getElementById('body-container');
    const sidebar = document.getElementById('sidebar');

    // 唤醒与关闭控制逻辑
    function toggleMenu(event) {
        if(event) event.stopPropagation();
        bodyContainer.classList.toggle('sidebar-active');
    }

    function openMenu() {
        bodyContainer.classList.add('sidebar-active');
    }

    function closeMenu() {
        bodyContainer.classList.remove('sidebar-active');
    }

    // 移动端触摸悬浮边缘直接唤醒
    sidebar.addEventListener('touchstart', function(e) {
        if (window.innerWidth <= 768) {
            openMenu();
        }
    }, {passive: true});

    // 全局手势滑动呼出逻辑：从屏幕左侧边缘右滑
    let touchStartX = 0;
    let touchStartY = 0;

    window.addEventListener('touchstart', function(e) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, {passive: true});

    window.addEventListener('touchend', function(e) {
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        
        // 判定手势：必须是从左侧边缘附近（开端小于50px）往右滑动，且横向位移大于纵向位移
        if (touchStartX < 50 && (touchEndX - touchStartX) > 60 && Math.abs(touchEndY - touchStartY) < 40) {
            if (window.innerWidth <= 768) {
                openMenu();
            }
        }
    }, {passive: true});

    // 导航响应事件
    function handleNavClick(key) {
        render(key);
        if (window.innerWidth <= 768) {
            closeMenu();
        }
    }

    // 数据动态渲染
    function render(key) {
        const data = DATA[key];
        document.getElementById('title').innerText = data.name;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.key === key));
        const grid = document.getElementById('grid');
        grid.innerHTML = data.items.map(item => `
            <div class="card" onclick="window.open('${item.url}', '_blank')">
                <div style="font-size: 24px; margin-bottom: 10px;">${item.icon}</div>
                <div style="font-weight: 600;">${item.name}</div>
                <div style="font-size: 13px; color: var(--text-secondary); margin-top: 4px;">${item.desc}</div>
            </div>
        `).join('');
    }

    // 初始化结构
    sidebar.innerHTML = `
        <div class="profile-zone">
            <div class="avatar"></div>
            <div style="font-weight: 600;">颜途的视界</div>
        </div>
    `;
    
    Object.keys(DATA).forEach(key => {
        const item = document.createElement('div');
        item.className = 'nav-item';
        item.dataset.key = key;
        item.innerText = DATA[key].name;
        item.onclick = () => handleNavClick(key);
        sidebar.appendChild(item);
    });

    render('cn'); 
</script>

</html>
