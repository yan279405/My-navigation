<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的全平台聚合空间</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .sidebar { width: 280px; background: #1e293b; padding: 20px; border-right: 1px solid #334155; }
        .main-content { flex-grow: 1; padding: 40px; display: flex; align-items: center; justify-content: center; text-align: center; }
        .nav-btn { display: block; width: 100%; padding: 12px; margin-bottom: 10px; background: #334155; color: white; border: none; cursor: pointer; text-align: left; border-radius: 8px; transition: 0.3s; }
        .nav-btn.active { background: #38bdf8; color: #0f172a; font-weight: bold; }
        .panel { display: none; width: 100%; height: 100%; }
        .panel.active { display: block; }
        .visit-btn { display: inline-block; padding: 15px 30px; background: #38bdf8; color: #0f172a; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 20px; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content" id="main-content">
        </main>

    <script>
        // 🚀 后台配置区
        const CONFIG = {
            platforms: [
                { id: "bili", name: "📺 Bilibili", url: "https://space.bilibili.com/你的UID", type: "link" },
                { id: "xhs", name: "📕 小红书", url: "https://www.xiaohongshu.com/user/profile/你的ID", type: "link" },
                { id: "douyin", name: "🎵 抖音", url: "https://www.douyin.com/user/...", type: "link" }
            ]
        };

        function render() {
            const sidebar = document.getElementById('sidebar');
            const main = document.getElementById('main-content');
            
            CONFIG.platforms.forEach((p, i) => {
                // 渲染左侧按钮
                sidebar.innerHTML += `<button class="nav-btn ${i === 0 ? 'active' : ''}" onclick="show('${p.id}', this)">${p.name}</button>`;
                
                // 渲染右侧内容：统一采用跳转按钮，保证 100% 可用
                main.innerHTML += `
                    <div id="${p.id}" class="panel ${i === 0 ? 'active' : ''}">
                        <div style="padding-top: 20%;">
                            <h1>${p.name}</h1>
                            <p>点击下方按钮，即可跳转到我的官方主页</p>
                            <a href="${p.url}" target="_blank" class="visit-btn">点击直达主页 →</a>
                        </div>
                    </div>
                `;
            });
        }

        function show(id, btn) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }
        render();
    </script>
</body>
</html>
